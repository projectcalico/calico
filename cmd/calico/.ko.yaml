# Base image is set at build time via KO_DEFAULTBASEIMAGE so it tracks
# metadata.mk's CALICO_BASE_VER (and any USE_UBI_AS_CALICO_BASE override).
# This literal is a fallback for ad-hoc `ko build` invocations without make.
defaultBaseImage: calico/base:ubi9-1777576815
defaultPlatforms:
  - linux/amd64
  - linux/arm64

builds:
  - id: calico
    main: ./
    env:
      - CGO_ENABLED=0
    ldflags:
      - "-s -w"
      - "-X github.com/projectcalico/calico/pkg/buildinfo.Version={{.Env.GIT_DESCRIPTION}}"
      - "-X github.com/projectcalico/calico/pkg/buildinfo.BuildDate={{.Env.DATE}}"
      - "-X github.com/projectcalico/calico/pkg/buildinfo.GitRevision={{.Env.GIT_COMMIT}}"
    flags:
      - -trimpath
      - -buildvcs=false
