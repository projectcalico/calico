# A Service and corresponding EndpointSlice.
# Endpoint on the local node, expect this route.
kind: Service
apiVersion: v1
metadata:
  name: service-1
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  clusterIP: 10.101.0.101
  ports:
    - port: 80
      protocol: TCP
      targetPort: 80

---
kind: EndpointSlice
apiVersion: discovery.k8s.io/v1
metadata:
  name: service-1-abc
  labels:
    kubernetes.io/service-name: service-1
addressType: IPv4
endpoints:
  - addresses:
      - 192.168.2.1
    nodeName: kube-master
    targetRef:
      kind: Pod
      name: nginx-1
      namespace: default
ports:
  - port: 80
    protocol: TCP

---
# A Service and corresponding EndpointSlice.
# Endpoint NOT on the local node, don't expect this route.
kind: Service
apiVersion: v1
metadata:
  name: service-2
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  clusterIP: 10.101.0.102
  ports:
    - port: 80
      protocol: TCP
      targetPort: 80

---
kind: EndpointSlice
apiVersion: discovery.k8s.io/v1
metadata:
  name: service-2-abc
  labels:
    kubernetes.io/service-name: service-2
addressType: IPv4
endpoints:
  - addresses:
      - 192.168.2.2
    nodeName: kube-node-1
    targetRef:
      kind: Pod
      name: nginx-2
      namespace: default
ports:
  - port: 80
    protocol: TCP
