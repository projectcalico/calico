kind: BGPConfiguration
apiVersion: projectcalico.org/v3
metadata:
  name: default
spec:
  nodeToNodeMeshEnabled: false
---
kind: Node
apiVersion: projectcalico.org/v3
metadata:
  name: kube-master
  labels:
    global-peer: yes
spec:
  bgp:
    ipv4Address: 10.192.0.2/16
    ipv6Address: "2001::102/64"
---
kind: Node
apiVersion: projectcalico.org/v3
metadata:
  name: kube-node-1
  labels:
    global-peer: yes
spec:
  bgp:
    ipv4Address: 10.192.0.3/16
    ipv6Address: "2001::103/64"
---
kind: Node
apiVersion: projectcalico.org/v3
metadata:
  name: kube-node-2
  labels:
    global-peer: yes
spec:
  bgp:
    ipv4Address: 10.192.0.4/16
    ipv6Address: "2001::104/64"
---
kind: BGPFilter
apiVersion: projectcalico.org/v3
metadata:
  name: test-filter-aspath-prio
spec:
  importV4:
    - action: Accept
      asPathPrefix: [65000]
      operations:
        - setPriority:
            value: 100
    - action: Accept
      asPathPrefix: [65000, 65001]
      operations:
        - setPriority:
            value: 200
    - action: Accept
  exportV4:
    - action: Accept
      priority: 100
      operations:
        - addCommunity:
            value: "65000:100"
    - action: Accept
      priority: 200
      operations:
        - prependASPath:
            prefix: [65000, 65001]
    - action: Reject
  importV6:
    - action: Accept
      asPathPrefix: [65000]
      operations:
        - setPriority:
            value: 100
    - action: Accept
  exportV6:
    - action: Accept
      priority: 100
      operations:
        - addCommunity:
            value: "65000:100"
    - action: Reject
---
kind: BGPPeer
apiVersion: projectcalico.org/v3
metadata:
  name: test-global-peer-with-filter
spec:
  peerSelector: has(global-peer)
  filters:
    - test-filter-aspath-prio
