kind: BGPConfiguration
apiVersion: projectcalico.org/v3
metadata:
  name: default
spec:
  nodeToNodeMeshEnabled: false
---
kind: Node
apiVersion: projectcalico.org/v3
metadata:
  name: kube-master
spec:
  bgp:
    ipv4Address: 10.192.0.2/16
    ipv6Address: "2001::102/64"
---
kind: Node
apiVersion: projectcalico.org/v3
metadata:
  name: kube-node-1
spec:
  bgp:
    ipv4Address: 10.192.0.3/16
    ipv6Address: "2001::103/64"
---
kind: Node
apiVersion: projectcalico.org/v3
metadata:
  name: kube-node-2
spec:
  bgp:
    ipv4Address: 10.192.0.4/16
    ipv6Address: "2001::104/64"
---
kind: BGPFilter
apiVersion: projectcalico.org/v3
metadata:
  name: kubevirt-lm
spec:
  exportV4:
    - action: Accept
      peerType: eBGP
      priority: 100
      operations:
        - addCommunity:
            value: "65000:100"
    - action: Accept
      peerType: eBGP
      priority: 200
      operations:
        - addCommunity:
            value: "65000:200"
        - prependASPath:
            prefix: [65000]
    - action: Reject
  importV4:
    - action: Accept
      communities:
        values: ["65000:100"]
      operations:
        - setPriority:
            value: 100
    - action: Accept
      asPathPrefix: [65000]
      operations:
        - setPriority:
            value: 200
    - action: Accept
  exportV6:
    - action: Accept
      peerType: eBGP
      priority: 100
      operations:
        - addCommunity:
            value: "65000:100"
    - action: Accept
      peerType: eBGP
      priority: 200
      operations:
        - addCommunity:
            value: "65000:200"
        - prependASPath:
            prefix: [65000]
    - action: Reject
  importV6:
    - action: Accept
      communities:
        values: ["65000:100"]
      operations:
        - setPriority:
            value: 100
    - action: Accept
      asPathPrefix: [65000]
      operations:
        - setPriority:
            value: 200
    - action: Accept
---
kind: BGPPeer
apiVersion: projectcalico.org/v3
metadata:
  name: kubevirt-ebgp-peer-v4
spec:
  node: kube-master
  peerIP: 10.192.0.3
  asNumber: 64517
  filters:
    - kubevirt-lm
---
kind: BGPPeer
apiVersion: projectcalico.org/v3
metadata:
  name: kubevirt-ebgp-peer-v6
spec:
  node: kube-master
  peerIP: 2001::103
  asNumber: 64517
  filters:
    - kubevirt-lm
