kind: BGPConfiguration
apiVersion: projectcalico.org/v3
metadata:
  name: default
spec:
  nodeToNodeMeshEnabled: false
---
kind: Node
apiVersion: projectcalico.org/v3
metadata:
  name: kube-master
  labels:
    global-peer: yes
spec:
  bgp:
    ipv4Address: 10.192.0.2/16
    ipv6Address: "2001::102/64"
---
kind: Node
apiVersion: projectcalico.org/v3
metadata:
  name: kube-node-1
  labels:
    global-peer: yes
spec:
  bgp:
    ipv4Address: 10.192.0.3/16
    ipv6Address: "2001::103/64"
---
kind: Node
apiVersion: projectcalico.org/v3
metadata:
  name: kube-node-2
  labels:
    global-peer: yes
spec:
  bgp:
    ipv4Address: 10.192.0.4/16
    ipv6Address: "2001::104/64"
---
kind: BGPFilter
apiVersion: projectcalico.org/v3
metadata:
  name: test-filter-large-comm
spec:
  importV4:
    - action: Accept
      communities:
        values: ["65000:100:200"]
      operations:
        - addCommunity:
            value: "65001:300:400"
    - action: Reject
  exportV4:
    - action: Accept
      communities:
        values: ["65000:100:200"]
    - action: Reject
  importV6:
    - action: Accept
      communities:
        values: ["65000:100:200"]
      operations:
        - addCommunity:
            value: "65001:300:400"
    - action: Reject
  exportV6:
    - action: Accept
      communities:
        values: ["65000:100:200"]
    - action: Reject
---
kind: BGPPeer
apiVersion: projectcalico.org/v3
metadata:
  name: test-global-peer-with-filter
spec:
  peerSelector: has(global-peer)
  filters:
    - test-filter-large-comm
