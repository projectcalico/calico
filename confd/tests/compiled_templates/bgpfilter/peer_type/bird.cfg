function apply_communities ()
{
}

# Generated by confd
include "bird_aggr.cfg";
include "bird_ipam.cfg";

router id 10.192.0.2;

# Configure synchronization between routing tables and kernel.
protocol kernel {
  learn;             # Learn all alien routes from the kernel
  persist;           # Don't remove routes on bird shutdown
  scan time 2;       # Scan kernel routing table every 2 seconds
  import all;
  export filter calico_kernel_programming; # Default is export none
  graceful restart;  # Turn on graceful restart to reduce potential flaps in
                     # routes when reloading BIRD configuration.  With a full
                     # automatic mesh, there is no way to prevent BGP from
                     # flapping since multiple nodes update their BGP
                     # configuration at the same time, GR is not guaranteed to
                     # work correctly in this scenario.
  merge paths on;    # Allow export multipath routes (ECMP)
}

# Watch interface up/down events.
protocol device {
  debug { states };
  scan time 2;    # Scan interfaces every 2 seconds
}

protocol direct {
  debug { states };
  interface -"cali*", -"kube-ipvs*", "*"; # Exclude cali* and kube-ipvs* but
                                          # include everything else.  In
                                          # IPVS-mode, kube-proxy creates a
                                          # kube-ipvs0 interface. We exclude
                                          # kube-ipvs0 because this interface
                                          # gets an address for every in use
                                          # cluster IP. We use static routes
                                          # for when we legitimately want to
                                          # export cluster IPs.
}


# Template for all BGP clients
template bgp bgp_template {
  debug { states };
  description "Connection to BGP peer";
  local as 64512;
  gateway recursive; # This should be the default, but just in case.
  add paths on;
  graceful restart;  # See comment in kernel section about graceful restart.
  connect delay time 2;
  connect retry time 5;
  error wait time 5,30;
}

# -------------- BGP Filters ------------------
# v4 BGPFilter test-filter-peertype
function 'bgp_test-filter-peertype_importFilterV4'(bool is_same_as) {
  if (is_same_as) then { if (((65000, 100) ~ bgp_community)) then { krt_metric = 100; accept; } }
  accept;
}
function 'bgp_test-filter-peertype_exportFilterV4'(bool is_same_as) {
  if (!is_same_as) then { if ((net ~ 10.0.0.0/8)) then { accept; } }
  if (is_same_as) then { if ((net ~ 172.16.0.0/12)) then { reject; } }
  reject;
}
# BGP Protocol Configurations
protocol bgp Global_10_192_0_3 from bgp_template {
  ttl security off;
  multihop;
  neighbor 10.192.0.3 as 64512;
  source address 10.192.0.2;  # The local address we use for the TCP connection
  import filter {
    krt_metric = 1024;
    if (defined(bgp_local_pref)) then {
      krt_metric = 2147483647 - bgp_local_pref;
    }
    'bgp_test-filter-peertype_importFilterV4'(true);
    if (krt_metric < 1024) then
      preference = 200;
    accept;
  };
  export filter {
    if (!defined(krt_metric)) then { krt_metric = 1024; }
    bgp_local_pref = 2147483647 - krt_metric;
    'bgp_test-filter-peertype_exportFilterV4'(true);
    calico_export_to_bgp_peers(true);
    reject;
  };  # Only want to export routes for workloads.
}
protocol bgp Global_10_192_0_4 from bgp_template {
  ttl security off;
  multihop;
  neighbor 10.192.0.4 as 64512;
  source address 10.192.0.2;  # The local address we use for the TCP connection
  import filter {
    krt_metric = 1024;
    if (defined(bgp_local_pref)) then {
      krt_metric = 2147483647 - bgp_local_pref;
    }
    'bgp_test-filter-peertype_importFilterV4'(true);
    if (krt_metric < 1024) then
      preference = 200;
    accept;
  };
  export filter {
    if (!defined(krt_metric)) then { krt_metric = 1024; }
    bgp_local_pref = 2147483647 - krt_metric;
    'bgp_test-filter-peertype_exportFilterV4'(true);
    calico_export_to_bgp_peers(true);
    reject;
  };  # Only want to export routes for workloads.
}


