---

extends: default

rules:
  line-length: disable
  document-start: disable
  truthy: disable
  indentation:
    spaces: consistent
    indent-sequences: consistent
  comments:
    require-starting-space: false
    min-spaces-from-content: 1
  comments-indentation: disable
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1

ignore:
  # template files are not valid yaml
  - charts/calico/templates/
  - charts/tigera-operator/templates/
  - process/testing/aso/infra/templates/
  # these dirs are not owned by us, we don't own yamls that they may contain
  - cni-plugin/containernetworking-plugins/
  - cni-plugin/flannel-cni-plugin/
  - pod2daemon/node-driver-registrar/
  - whisker/node_modules/
  - felix/bpf-gpl/libbpf/
  - third_party/*/
