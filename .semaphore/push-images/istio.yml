version: v1.0
name: Publish istio images
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204
execution_time_limit:
  minutes: 60
global_job_config:
  env_vars:
    - name: DEV_REGISTRIES
      value: quay.io/calico docker.io/calico
  secrets:
    - name: docker
    - name: quay-robot-calico+semaphoreci
  prologue:
    commands:
      - checkout
      # Semaphore is doing shallow clone on a commit without tags.
      # unshallow it for GIT_VERSION:=$(shell git describe --tags --dirty --always)
      - retry git fetch --unshallow
      - echo $DOCKER_TOKEN | docker login --username "$DOCKER_USER" --password-stdin
      - echo $QUAY_TOKEN | docker login --username "$QUAY_USER" --password-stdin quay.io
      - export BRANCH_NAME=$SEMAPHORE_GIT_BRANCH
      - ssh-add ~/.ssh/id_rsa
blocks:
  - name: Publish tigera/istio-ztunnel images
    skip:
      when: "branch !~ '.+'"
    dependencies: []
    task:
      jobs:
        - name: Linux amd64
          commands:
            - if [ -z "${SEMAPHORE_GIT_PR_NUMBER}" ]; then make -C third_party/istio-ztunnel cd CONFIRM=true; fi

  - name: Publish tigera/istio-ztunnel images - native arm64 runner
    skip:
      when: "branch !~ '.+'"
    dependencies: []
    task:
      agent:
        machine:
          type: s1-aws-arm64-2
      jobs:
        - name: Linux arm64
          commands:
            - if [ -z "${SEMAPHORE_GIT_PR_NUMBER}" ]; then make -C third_party/istio-ztunnel cd CONFIRM=true; fi

  - name: Publish calico/istio-ztunnel multi-arch manifests
    dependencies:
      - Publish tigera/istio-ztunnel images
      - Publish tigera/istio-ztunnel images - native arm64 runner
    skip:
      when: "branch !~ '.+'"
    task:
      jobs:
        - name: Linux multi-arch manifests
          commands:
            - if [ -z "${SEMAPHORE_GIT_PR_NUMBER}" ]; then make -C third_party/istio-ztunnel cd push-manifest CONFIRM=true; fi
  - name: Publish istio images and multi-arch manifests
    dependencies:
      - Publish calico/istio-ztunnel multi-arch manifests
    skip:
      when: "branch !~ '.+'"
    task:
      jobs:
        - name: Linux multi-arch
          commands:
            - if [ -z "${SEMAPHORE_GIT_PR_NUMBER}" ]; then make -C istio cd push-manifests-with-tag CONFIRM=true; fi
