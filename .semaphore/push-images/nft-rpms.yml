version: v1.0
name: Publish nftables RPM images
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2204
execution_time_limit:
  minutes: 60
global_job_config:
  secrets:
    - name: docker
    # S3 object-storage credentials for the .semaphore/s3-cmd download below.
    - name: go-build-cache-hetzner-s3-credentials
  prologue:
    commands:
      - checkout
      - retry git fetch --unshallow
      - export S3_WORKFLOW_DIR=s3://$CALICO_S3_BUCKET/$CALICO_S3_KEY_PREFIX/workflow/${SEMAPHORE_WORKFLOW_ID}
      - sudo apt-get install -y zstd s3cmd || true
      - mkdir -p logs
      - export BUILD_LOG="logs/push-nft-rpms-${ARCH}.log"
  epilogue:
    always:
      commands:
        - artifact push job logs --destination semaphore/logs || true
blocks:
  - name: Publish nftables RPM images
    dependencies: []
    skip:
      when: "branch !~ '.+'"
    task:
      jobs:
        - name: Push cached nftables RPMs
          matrix:
            - env_var: ARCH
              values:
                - amd64
                - arm64
                - ppc64le
                - s390x
          commands:
            - .semaphore/scripts/push-nft-rpms.sh "${ARCH}"
