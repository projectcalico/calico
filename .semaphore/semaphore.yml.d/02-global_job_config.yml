global_job_config:
  secrets:
    - name: docker-hub
    - name: google-service-account-for-gce
    # Provides the S3 object-storage credentials consumed by .semaphore/s3-cmd
    # and the cache restore/store steps below: CALICO_S3_ACCESS_KEY,
    # CALICO_S3_SECRET_KEY and (optionally, for a non-AWS endpoint)
    # CALICO_S3_HOST / CALICO_S3_HOST_BUCKET.
    - name: go-build-cache-hetzner-s3-credentials
  env_vars:
    - name: GOOGLE_PROJECT
      value: unique-caldron-775
    # GCS bucket used *only* for the FV test artifacts that the GCP test VMs
    # pull (fv-artifacts/) and the FV failure logs they push (failed-fv-logs/).
    # Those objects live in Google Cloud so the in-cloud test VMs fetch them
    # without cross-cloud egress; everything else (build cache, per-workflow
    # build images) stays on the S3 bucket below. Accessed via `gcloud storage`
    # with the google-service-account-for-gce secret — not via s3cmd.
    - name: GCS_BUILD_CACHE_BUCKET
      value: calico-transient-build-artifacts-europe-west3
    - name: BUILDKIT_PROGRESS
      value: plain
    - name: SEMAPHORE_AGENT_UPLOAD_JOB_LOGS
      value: when-trimmed
  prologue:
    commands:
      - export CALICO_DIR_NAME=${SEMAPHORE_GIT_DIR}
      - export S3_CACHE_DIR=s3://$CALICO_S3_BUCKET/$CALICO_S3_KEY_PREFIX/cache/${CALICO_DIR_NAME}
      - export S3_WORKFLOW_DIR=s3://$CALICO_S3_BUCKET/$CALICO_S3_KEY_PREFIX/workflow/${SEMAPHORE_WORKFLOW_ID}
      # The FV test artifacts the GCP VMs exchange live in GCS (see
      # GCS_BUILD_CACHE_BUCKET above); the per-workflow build images keep the
      # parallel S3 layout under S3_WORKFLOW_DIR.
      - export GCS_WORKFLOW_DIR=gs://$GCS_BUILD_CACHE_BUCKET/workflow/${SEMAPHORE_WORKFLOW_ID}
      - export GOOGLE_APPLICATION_CREDENTIALS=$HOME/secrets/secret.google-service-account-key.json
      - |-
        if [[ $(uname -m) != "x86_64" || -n "$ARCH" ]]; then
          echo "Non-x86_64 build: $(uname -m) / $ARCH";
          export BUILD_CACHE_GROUP=$BUILD_CACHE_GROUP-$(uname -m)-$ARCH;
        fi
      # gcloud auth is required for the gcloud compute (test VM) calls in the
      # Felix/Node FV blocks and for the FV artifact exchange with GCS
      # (GCS_WORKFLOW_DIR). The build cache and per-workflow build images go
      # through s3cmd instead.
      - gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS" || true
      - gcloud config set project ${GOOGLE_PROJECT} || true
      - sudo apt-get install -y zstd s3cmd || true
      # Write the s3cmd config from the env so the cache restore/store steps in
      # this prologue can run before the working copy (and the .semaphore/s3-cmd
      # wrapper) has been checked out.
      - |-
        umask 077
        cat >"$HOME/.s3cfg" <<S3CFG
        [default]
        access_key = ${CALICO_S3_ACCESS_KEY}
        secret_key = ${CALICO_S3_SECRET_KEY}
        ${CALICO_S3_HOST:+host_base = ${CALICO_S3_HOST}}
        ${CALICO_S3_HOST:+host_bucket = ${CALICO_S3_HOST_BUCKET:-%(bucket)s.${CALICO_S3_HOST}}}
        S3CFG
      # Try to restore the working copy from the cache, if available. Then,
      # for PRs, also try to restore the build cache.  (We skip this on branch
      # builds to ensure branches build cleanly.)
      - restored_wc_cache=false
      - |-
        if [[ -n "${SEMAPHORE_GIT_BRANCH}" && -z "$SKIP_CACHE_RESTORE" ]]; then
          echo "Looking for cached working copy for branch ${SEMAPHORE_GIT_BRANCH}"
          s3_branch_cache_dir="${S3_CACHE_DIR}/${SEMAPHORE_GIT_BRANCH}"
          # On master, use Semaphore's free built-in cache; other branches still
          # use S3. (For PRs, SEMAPHORE_GIT_BRANCH is the base branch, so PRs
          # targeting master restore master's Semaphore cache.) Note: `cache
          # restore` exits 0 even on a miss, so we test for the restored file.
          if [[ "${SEMAPHORE_GIT_BRANCH}" == "master" ]]; then use_sem_cache=true; else use_sem_cache=false; fi
          rm -f /tmp/working-copy.tar.zstd
          if ${use_sem_cache}; then
            cache restore "working-copy-${SEMAPHORE_GIT_BRANCH}" || true
          else
            s3cmd get --force "$s3_branch_cache_dir/working-copy.tar.zstd" /tmp/working-copy.tar.zstd || true
          fi
          if [[ -f /tmp/working-copy.tar.zstd ]]; then
            echo "Restoring cache for branch ${SEMAPHORE_GIT_BRANCH}"
            tar --use-compress-program=zstd -xf /tmp/working-copy.tar.zstd & tar_pid=$!
            downloaded_build_cache=false
            if [[ -n "$BUILD_CACHE_GROUP" && -n "${SEMAPHORE_GIT_PR_NUMBER}" ]]; then
              rm -f /tmp/build-cache.tar.zstd
              if ${use_sem_cache}; then
                cache restore "build-cache-${SEMAPHORE_GIT_BRANCH}-${BUILD_CACHE_GROUP}" || true
              else
                s3cmd get --force "$s3_branch_cache_dir/build-cache-${BUILD_CACHE_GROUP}.tar.zstd" /tmp/build-cache.tar.zstd || true
              fi
              if [[ -f /tmp/build-cache.tar.zstd ]]; then
                echo "Found build cache for group ${BUILD_CACHE_GROUP}"
                downloaded_build_cache=true
              fi
            fi
            if wait $tar_pid; then
              restored_wc_cache=true
            else
              echo "ERROR: Failed to extract working copy"
              restored_wc_cache=false
            fi
            if ${downloaded_build_cache}; then
              echo "Extracting build cache"
              tar --use-compress-program=zstd -xf /tmp/build-cache.tar.zstd -C .
              rm /tmp/build-cache.tar.zstd
            fi
            cd "${CALICO_DIR_NAME}"
          fi
        fi || true
      - |-
        if [[ ${restored_wc_cache} != true && -z "$SKIP_CHECKOUT" ]]; then
          echo "No cache restored, doing a fresh checkout..."
          cd $HOME
          rm -rf "${CALICO_DIR_NAME}"
          git clone --filter=blob:none $SEMAPHORE_GIT_URL $CALICO_DIR_NAME
          cd "${CALICO_DIR_NAME}" || exit 1
        fi
      - |-
        if [[ -z "$SKIP_CHECKOUT" ]]; then
          git fetch origin --tags --prune-tags ${SEMAPHORE_GIT_SHA}
          if [ "$SEMAPHORE_GIT_REF_TYPE" = "branch" ]; then
            git checkout ${SEMAPHORE_GIT_SHA} -B "${SEMAPHORE_GIT_BRANCH}"
          else
            git checkout ${SEMAPHORE_GIT_SHA}
          fi
          CALICO_DIR="$(pwd)"
          export CALICO_DIR
          mkdir -p artifacts
        fi
      - echo $DOCKERHUB_PASSWORD | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
      # Ensure calico/go-build is present, cheaply. Pull from Docker Hub first
      # (free egress) and only fall back to the S3 cache — populated by the
      # "Pull: go-build image" prerequisite job — if the pull fails. This keeps
      # object-storage egress near zero in the common case while keeping S3 as a
      # robustness fallback for the occasional Docker Hub pull failure (which we
      # still see even with an authenticated session). Skipped on non-x86_64 /
      # cross-compile agents since the cache is amd64-only.
      - |-
        if [[ $(uname -m) == "x86_64" && -z "$ARCH" ]]; then
          GO_BUILD_VER=$(make --no-print-directory -f metadata.mk -f - <<<'print:; @echo $(GO_BUILD_VER)' print)
          image="calico/go-build:${GO_BUILD_VER}"
          if ! docker image inspect "$image" >/dev/null 2>&1; then
            if docker pull "$image"; then
              echo "Pulled ${image} from Docker Hub"
            else
              echo "Docker Hub pull failed for ${image}, falling back to S3 cache"
              cache_path="s3://${CALICO_S3_BUCKET}/${CALICO_S3_KEY_PREFIX}/images/calico-go-build-${GO_BUILD_VER}.tar.zst"
              if s3cmd get --force "$cache_path" /tmp/go-build.tar.zst 2>/dev/null; then
                echo "Loading ${image} from S3 cache"
                zstd -d --rm -o /tmp/go-build.tar /tmp/go-build.tar.zst
                docker load -i /tmp/go-build.tar
                rm -f /tmp/go-build.tar
              else
                echo "No S3 fallback for ${image}; later docker use will retry the pull"
              fi
            fi
          fi
        fi
  epilogue:
    commands:
      - cd $HOME
      - |-
        if [[ -z "${SEMAPHORE_GIT_PR_NUMBER}" && -n "$BUILD_CACHE_GROUP" && "$STORE_BUILD_CACHE" = "true" ]]; then
          echo "On branch, storing build cache group ${BUILD_CACHE_GROUP}"
          tar --use-compress-program="zstd -3" -cf /tmp/build-cache.tar.zstd go ${CALICO_DIR_NAME}/.go-pkg-cache
          if [[ "${SEMAPHORE_GIT_BRANCH}" == "master" ]]; then
            # master uses Semaphore's free cache; delete-then-store guarantees a
            # refresh each master build regardless of `cache store` overwrite semantics.
            key="build-cache-${SEMAPHORE_GIT_BRANCH}-${BUILD_CACHE_GROUP}"
            cache delete "$key" || true
            cache store "$key" /tmp/build-cache.tar.zstd
          else
            # We have cd'd to $HOME; the working copy (with the s3-cmd wrapper)
            # lives at ./${CALICO_DIR_NAME}. Going through the wrapper rather than
            # bare s3cmd applies the CALICO_S3_EXPIRY_DAYS default expiry.
            s3_branch_cache_dir="${S3_CACHE_DIR}/${SEMAPHORE_GIT_BRANCH}"
            "${CALICO_DIR_NAME}/.semaphore/s3-cmd" cp /tmp/build-cache.tar.zstd "$s3_branch_cache_dir/build-cache-${BUILD_CACHE_GROUP}.tar.zstd"
          fi
        fi
      - cd "$CALICO_DIR"
      - .semaphore/publish-artifacts
