after_pipeline:
  task:
    secrets:
      # RELEASE_MONITOR_AGENT_URL / RELEASE_MONITOR_AGENT_TOKEN for the branch-monitor agent.
      - name: slack-master-release-monitor
    jobs:
      - name: Reports
        commands:
          - test-results gen-pipeline-report --force
      - name: Branch CI monitor
        commands:
          # On EVERY master/release-* pipeline (pass AND fail), hand the run to the
          # branch-monitor agent. The agent records the run in its state engine
          # (which dedups, escalates back-to-back/intermittent, and tracks recovery)
          # and posts to Slack itself when there is something worth reporting. A pass
          # is recorded too so the engine can recover open incidents for the branch.
          - |
            case "$SEMAPHORE_GIT_BRANCH" in
              master|release-*) ;;
              *) echo "branch $SEMAPHORE_GIT_BRANCH not monitored"; exit 0 ;;
            esac
            case "$SEMAPHORE_PIPELINE_RESULT" in
              passed) result=pass ;;
              failed) result=fail ;;
              *) echo "pipeline result '${SEMAPHORE_PIPELINE_RESULT}' — not recorded"; exit 0 ;;
            esac
            msg=$(printf 'repo: calico\nbranch: %s\nworkflow_id: %s\nresult: %s\npipeline: %s' \
              "$SEMAPHORE_GIT_BRANCH" "$SEMAPHORE_WORKFLOW_ID" "$result" "${SEMAPHORE_PIPELINE_NAME:-calico}")
            req=$(jq -n --arg t "$msg" '{jsonrpc:"2.0",id:"1",method:"message/send",params:{message:{role:"user",kind:"message",messageId:"1",parts:[{kind:"text",text:$t}]}}}')
            # message/send is synchronous: the agent records the run and posts to
            # Slack itself before replying. We only need the trigger to land. A cold
            # agent through Cloudflare can take a while (a failed run also runs
            # sem-ai triage), so retry until the call returns a JSON-RPC result.
            for i in 1 2 3; do
              resp=$(curl -sS -m 200 -X POST "$RELEASE_MONITOR_AGENT_URL" \
                -H "Authorization: Bearer $RELEASE_MONITOR_AGENT_TOKEN" \
                -H "Content-Type: application/json" -d "$req" || true)
              # Echo the raw a2a response so a failed trigger can be debugged
              # from the Semaphore log.
              echo "attempt $i raw agent response: $resp"
              printf '%s' "$resp" | jq -e '.result' >/dev/null 2>&1 && exit 0
              echo "attempt $i: no result yet (agent may be cold) — retrying"; sleep 15
            done
            echo "branch-monitor: agent did not respond after retries — skipping"
