- name: "E2E tests (platforms)"
  run:
    when: "${FORCE_RUN} or change_in(['/e2e/**'], {pipeline_file: 'ignore', exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE']})"
  dependencies:
    - Prerequisites
  task:
    secrets:
      - name: marvin-github-ssh-private-key
      - name: banzai-secrets
    prologue:
      commands:
        - checkout
        - source .semaphore/end-to-end/scripts/global_prologue.sh
    epilogue:
      always:
        commands:
          - ~/calico/.semaphore/end-to-end/scripts/global_epilogue.sh
    env_vars:
      - name: TEST_TYPE
        value: k8s-e2e
      - name: PRODUCT
        value: calico
      - name: RUN_LOCAL_TESTS
        value: "true"
      - name: USE_PRIVATE_REGISTRY
        value: "true"
      - name: PRIVATE_REGISTRY
        value: "quay.io/"
      - name: K8S_E2E_FLAGS
        # Skipped test labels:
        # - Slow: long-running tests not suitable for CI
        # - Disruptive: tests that break cluster state for other tests
        # - RequiresBGPMesh: requires BGP routing, but this cluster uses VXLAN
        # - NoEncap: requires non-encapsulated routing, but this cluster uses VXLAN
        # - Feature:Istio: Calico policy not enforced with Istio ambient on BPF dataplane
        value: --ginkgo.focus=(\[sig-calico\]) --ginkgo.skip=(\[Slow\]|\[Disruptive\]|\[RequiresBGPMesh\]|\[NoEncap\]|\[Feature:Istio\])
      - name: USE_API_SERVER
        value: "false"
    jobs:
      - name: "gcp-kubeadm (k8s-stable, BPF)"
        execution_time_limit:
          hours: 3
        commands:
          - ~/calico/.semaphore/end-to-end/scripts/body_standard.sh
        env_vars:
          - name: PROVISIONER
            value: "gcp-kubeadm"
          - name: K8S_VERSION
            value: "stable"
          - name: INSTALLER
            value: "operator"
          - name: DATAPLANE
            value: "CalicoBPF"

      - name: "aws-eks (k8s-stable, BPF)"
        execution_time_limit:
          hours: 3
        commands:
          - ~/calico/.semaphore/end-to-end/scripts/body_standard.sh
        env_vars:
          - name: PROVISIONER
            value: "aws-eks"
          - name: K8S_VERSION
            value: "stable"
          - name: INSTALLER
            value: "operator"
          - name: DATAPLANE
            value: "CalicoBPF"

      - name: "gcp-rke2 (k8s-stable, nftables)"
        execution_time_limit:
          hours: 3
        commands:
          - ~/calico/.semaphore/end-to-end/scripts/body_standard.sh
        env_vars:
          - name: PROVISIONER
            value: "gcp-rke2"
          - name: K8S_VERSION
            value: "stable"
          - name: INSTALLER
            value: "operator"
          - name: DATAPLANE
            value: "CalicoNftables"
          - name: KUBE_PROXY_MODE
            value: "nftables"
