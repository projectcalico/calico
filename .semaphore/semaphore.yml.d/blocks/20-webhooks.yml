- name: webhooks
  run:
    when: "${CHANGE_IN(webhooks,api,apiserver)}"
  dependencies:
    - Prerequisites
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "calico"
    prologue:
      commands:
        - cd webhooks
    jobs:
      - name: "webhooks: CI"
        commands:
          - ../.semaphore/run-and-monitor make-ci.log make ci
    epilogue:
      always:
        commands:
          - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
