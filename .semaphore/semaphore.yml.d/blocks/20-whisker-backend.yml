- name: Whisker backend
  run:
    when: "${CHANGE_IN(whisker-backend)}"
  execution_time_limit:
    minutes: 30
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd whisker-backend
    jobs:
      - name: "Whisker backend: CI"
        commands:
          - ../.semaphore/run-and-monitor make-ci.log make ci
    epilogue:
      always:
        commands:
          - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
