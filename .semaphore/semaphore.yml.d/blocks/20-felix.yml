- name: "Felix: Build"
  run:
    when: "${CHANGE_IN(felix,typha,non-go:/.semaphore/vms/)}"
  dependencies:
    - Prerequisites
    - "Build: calico image"
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "calico"
      # Fail loud if `make` tries to clone libbpf — the prologue restores
      # the pre-built tarball from GCS, and a re-clone would negate the
      # cache and re-expose the github.com/libbpf HTTP 500 flake.
      - name: NO_LIBBPF_CLONE
        value: "true"
    prologue:
      commands:
        # Load the pre-built calico image (touches the marker so the nested
        # `make -C cmd/calico image` invocation inside fv-prereqs is a no-op)
        # and pull the cgo + race binaries into place so build-calico-cgo /
        # build-calico-race skip their rebuilds.
        - .semaphore/load-cached-images
        - mkdir -p cmd/calico/bin
        - gcloud storage cp "${GCS_WORKFLOW_DIR}/calico-cgo-amd64" cmd/calico/bin/calico-cgo-amd64
        - gcloud storage cp "${GCS_WORKFLOW_DIR}/calico-race-amd64" cmd/calico/bin/calico-race-amd64
        - chmod +x cmd/calico/bin/calico-cgo-amd64 cmd/calico/bin/calico-race-amd64
        # Extract the pre-built libbpf (clone + compiled amd64/libbpf.a)
        # produced by "Build: calico image". Verify the compiled static
        # lib landed so a broken tarball fails fast rather than triggering
        # the NO_LIBBPF_CLONE guard mid-build.
        - gcloud storage cp "${GCS_WORKFLOW_DIR}/libbpf-amd64.tar.zst" /tmp/libbpf-amd64.tar.zst
        - tar --use-compress-program="zstd -d" -xf /tmp/libbpf-amd64.tar.zst -C felix/bpf-gpl
        - test -f felix/bpf-gpl/libbpf/src/amd64/libbpf.a || (echo "ERROR libbpf tarball missing compiled libbpf.a" >&2; exit 1)
        - cd felix
        - gcloud config set project unique-caldron-775
        - gcloud auth activate-service-account --key-file=$HOME/secrets/secret.google-service-account-key.json
    secrets:
      - name: google-service-account-for-gce
      - name: gemini-api-key
      - name: fv-tests-guru-github-token
    jobs:
      - name: "Felix: Build and cache FV prerequisites"
        priority:
        # This job is on the critical path so we increase its priority.
          - value: 51
            when: "pull_request =~ '.+'"
        execution_time_limit:
          minutes: 20
        commands:
          # Skip `make build` (which on amd64 also cross-compiles
          # bin/calico-felix.exe) since the Windows binary is produced by the
          # dedicated "Felix: Build Windows binaries" block and nothing in the
          # Linux FV path consumes it.
          #
          # REMOTE_DEPS= overrides the Makefile's default which would invoke
          # `make -C cmd/calico image` and `make -C cmd/calico build-race`;
          # the calico-image producer block has already built those and the
          # prologue preloaded the image and race binary.
          - make REMOTE_DEPS= bin/calico-felix image ut-bpf-prereqs fv-prereqs
          - ./.semaphore/cache-test-artifacts
      - name: "Felix: Static checks"
        priority:
          # This job is on the critical path so we increase its priority.
          - value: 51
            when: "pull_request =~ '.+'"
        execution_time_limit:
          minutes: 15
        commands:
          - ../.semaphore/run-and-monitor static-checks.log make static-checks
    epilogue:
      always:
        commands:
          - ./.semaphore/analyze-test-failures --ut || true
          - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
# Felix UT and k8sfv don't produce artifacts consumed by Felix: FV, so they
# run in their own block in parallel with Felix: FV instead of blocking it.
# They still need the preloaded calico image + race binary (k8sfv runs the
# combined binary as `component typha`), so the prologue mirrors Felix: Build.
- name: "Felix: UT"
  run:
    when: "${CHANGE_IN(felix,typha,non-go:/.semaphore/vms/)}"
  dependencies:
    - Prerequisites
    - "Build: calico image"
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "calico"
      - name: NO_LIBBPF_CLONE
        value: "true"
    prologue:
      commands:
        - .semaphore/load-cached-images
        - mkdir -p cmd/calico/bin
        - gcloud storage cp "${GCS_WORKFLOW_DIR}/calico-cgo-amd64" cmd/calico/bin/calico-cgo-amd64
        - gcloud storage cp "${GCS_WORKFLOW_DIR}/calico-race-amd64" cmd/calico/bin/calico-race-amd64
        - chmod +x cmd/calico/bin/calico-cgo-amd64 cmd/calico/bin/calico-race-amd64
        - gcloud storage cp "${GCS_WORKFLOW_DIR}/libbpf-amd64.tar.zst" /tmp/libbpf-amd64.tar.zst
        - tar --use-compress-program="zstd -d" -xf /tmp/libbpf-amd64.tar.zst -C felix/bpf-gpl
        - test -f felix/bpf-gpl/libbpf/src/amd64/libbpf.a || (echo "ERROR libbpf tarball missing compiled libbpf.a" >&2; exit 1)
        - cd felix
        - gcloud config set project unique-caldron-775
        - gcloud auth activate-service-account --key-file=$HOME/secrets/secret.google-service-account-key.json
    secrets:
      - name: google-service-account-for-gce
      - name: gemini-api-key
      - name: fv-tests-guru-github-token
    jobs:
      - name: "Felix: UT"
        execution_time_limit:
          minutes: 30
        commands:
          - ../.semaphore/run-and-monitor ut.log make ut
      - name: "Felix: k8sfv"
        execution_time_limit:
          minutes: 15
        commands:
          # REMOTE_DEPS= relies on the prologue having preloaded the calico
          # image + cgo/race binaries (see Felix: Build and cache FV prerequisites
          # for details).
          - ../.semaphore/run-and-monitor k8sfv-typha.log make REMOTE_DEPS= k8sfv-test JUST_A_MINUTE=true USE_TYPHA=true
          - ../.semaphore/run-and-monitor k8sfv-no-typha.log make REMOTE_DEPS= k8sfv-test JUST_A_MINUTE=true USE_TYPHA=false
    epilogue:
      always:
        commands:
          - ./.semaphore/analyze-test-failures --ut || true
          - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
- name: "Felix: Build Windows binaries"
  run:
    when: "${CHANGE_IN(felix)}"
  dependencies:
    - Prerequisites
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "calico"
    jobs:
      - name: "Felix: Build Windows binaries"
        commands:
          - cd felix
          - make bin/calico-felix.exe fv/win-fv.exe
- name: "Felix: Windows FV"
  run:
    when: "false or ${CHANGE_IN(felix,non-go:/process/testing/aso,non-go:/process/testing/utils,non-go:/process/testing/winfv-felix)}"
  dependencies: ["Felix: Build Windows binaries"]
  task:
    secrets:
      - name: banzai-secrets
      - name: private-repo
    prologue:
      commands:
        - az login --service-principal -u "${AZ_SP_ID}" -p "${AZ_SP_PASSWORD}" --tenant "${AZ_TENANT_ID}" --output none
        - export REPORT_DIR=/home/semaphore/report
        - export AZURE_SUBSCRIPTION_ID=$AZ_SUBSCRIPTION_ID
        - export AZURE_TENANT_ID=$AZ_TENANT_ID
        - export AZURE_CLIENT_ID=$AZ_SP_ID
        - export AZURE_CLIENT_SECRET=$AZ_SP_PASSWORD
        - export REPORT_DIR=/home/semaphore/calico/process/testing/winfv-felix/report
        - export LOGS_DIR=~/fv.log
        - export RG_PREFIX=${USER}-win-felix-${SEMAPHORE_GIT_SHA:0:4}-pr${SEMAPHORE_GIT_PR_NUMBER}
        - cd felix
    epilogue:
      always:
        commands:
          - artifact push job ${REPORT_DIR} --destination semaphore/test-results || true
          - artifact push job ${LOGS_DIR} --destination semaphore/logs || true
          - cd ~/calico/process/testing/aso && make dist-clean
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "calico"
      - name: FV_TYPE
        value: "calico-felix"
      - name: SEMAPHORE_ARTIFACT_EXPIRY
        value: 2w
      - name: CONTAINERD_VERSION
        value: 1.7.28
    jobs:
      - name: "Felix: Windows FV"
        commands:
          - export AZURE_RESOURCE_GROUP=${RG_PREFIX}-rg
          - echo AZURE_RESOURCE_GROUP=${AZURE_RESOURCE_GROUP}
          - ../.semaphore/run-and-monitor win-fv-felix.log ~/calico/process/testing/winfv-felix/run-win-fv.sh
- name: "Felix: FV"
  run:
    when: "${CHANGE_IN(felix,typha,non-go:/.semaphore/vms/)}"
  dependencies:
    - "Felix: Build"
  task:
    epilogue:
      always:
        commands:
          - source felix/.semaphore/fv-epilogue
    secrets:
      - name: google-service-account-for-gce
      - name: gemini-api-key
      - name: fv-tests-guru-github-token
    jobs:
      - name: "Felix: iptables tests on Ubuntu 22.04"
        execution_time_limit:
          minutes: 60
        env_vars:
          - name: JOB_TIMEOUT_MINUTES
            value: "60"
          - name: FELIX_TEST_GROUP
            value: "22.04-ipt"
        commands:
          - source felix/.semaphore/fv-prologue
          - export NUM_FV_BATCHES=16
          - .semaphore/vms/run-tests-on-vms ${VM_PREFIX}
      - name: "Felix: nftables tests on Ubuntu 22.04"
        execution_time_limit:
          minutes: 60
        env_vars:
          - name: JOB_TIMEOUT_MINUTES
            value: "60"
          - name: FELIX_TEST_GROUP
            value: "22.04-nft"
        commands:
          - source felix/.semaphore/fv-prologue
          - export NUM_FV_BATCHES=16
          - .semaphore/vms/run-tests-on-vms ${VM_PREFIX}
      - name: "Felix: BPF tests on Ubuntu 24.04 (iptables)"
        execution_time_limit:
          minutes: 60
        env_vars:
          - name: JOB_TIMEOUT_MINUTES
            value: "60"
          - name: FELIX_TEST_GROUP
            value: "bpf-24.04-ipt-with-ut"
        commands:
          - source felix/.semaphore/fv-prologue
          - export NUM_FV_BATCHES=60
          - .semaphore/vms/run-tests-on-vms ${VM_PREFIX}
      - name: "Felix: BPF tests on Ubuntu 22.04 (nftables)"
        execution_time_limit:
          minutes: 60
        env_vars:
          - name: JOB_TIMEOUT_MINUTES
            value: "60"
          - name: FELIX_TEST_GROUP
            value: "bpf-22.04-nft-with-ut"
          - name: FELIX_FV_BPFATTACHTYPE
            value: "tc"
        commands:
          - source felix/.semaphore/fv-prologue
          # Limit to BPF conntrack tests to reduce overall runtime.
          - export FV_FOCUS='_BPF_.*ct=true'
          - export NUM_FV_BATCHES=10
          - .semaphore/vms/run-tests-on-vms ${VM_PREFIX}
      - name: "Felix: BPF tests on Ubuntu 25.10 with netkit (nftables)"
        execution_time_limit:
          minutes: 60
        env_vars:
          - name: FELIX_TEST_GROUP
            value: "bpf-25.10-nft-no-fv-with-ut"
          - name: FELIX_FV_BPFATTACHTYPE
            value: "tc"
          - name: JOB_TIMEOUT_MINUTES
            value: "30"
          - name: FELIX_FV_NETKIT
            value: "Enabled"
        commands:
          - source felix/.semaphore/fv-prologue
          - export NUM_FV_BATCHES=60
          - .semaphore/vms/run-tests-on-vms ${VM_PREFIX}
      - name: "Felix: BPF tests on Ubuntu 25.10 with jitharden=2 (nftables)"
        execution_time_limit:
          minutes: 60
        env_vars:
          - name: JOB_TIMEOUT_MINUTES
            value: "60"
          - name: FELIX_TEST_GROUP
            value: "bpf-25.10-nft-with-ut-jitharden"
          - name: FELIX_FV_BPFATTACHTYPE
            value: "tc"
        commands:
          - source felix/.semaphore/fv-prologue
          # Limit to BPF TCP+conntrack tests to reduce overall runtime.
          - export FV_FOCUS='_BPF_.*tcp.*ct=true'
          - export NUM_FV_BATCHES=16
          - .semaphore/vms/run-tests-on-vms ${VM_PREFIX}
