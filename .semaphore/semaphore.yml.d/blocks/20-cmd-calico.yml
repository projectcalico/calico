- name: cmd/calico
  run:
    when: "${CHANGE_IN(cmd/calico)}"
  dependencies:
    - Prerequisites
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "calico"
    prologue:
      commands:
        - cd cmd/calico
    jobs:
      - name: "cmd/calico: UT"
        commands:
          - ../../.semaphore/run-and-monitor ut.log make ut
