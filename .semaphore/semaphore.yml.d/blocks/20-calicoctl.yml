- name: calicoctl
  run:
    when: "${CHANGE_IN(calicoctl)}"
  dependencies:
    - Prerequisites
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "calico"
    prologue:
      commands:
        - cd calicoctl
    jobs:
      - name: "calicoctl: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
    epilogue:
      always:
        commands:
          - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
