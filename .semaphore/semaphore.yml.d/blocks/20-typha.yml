- name: Typha
  run:
    when: "${CHANGE_IN(typha)}"
  dependencies:
    - Prerequisites
    - "Build: calico image"
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "calico-image"
    prologue:
      commands:
        - .semaphore/load-cached-images
        - cd typha
    jobs:
      - name: "Typha: UT and FV tests"
        commands:
          - export TEST_SUITE_PREFIX="calico/base"
          - ../.semaphore/run-and-monitor make-ci.log make ci
        env_vars:
          - name: STORE_BUILD_CACHE
            value: "true"
      - name: "Typha: FV tests on UBI-minimal"
        commands:
          - 'export TEST_SUITE_PREFIX="UBI-minimal"'
          # Rebuild the combined image with UBI-minimal as CALICO_BASE,
          # then run Typha FV against it.
          - ../.semaphore/run-and-monitor make-fv-ubi.log bash -c 'make -C ../cmd/calico clean image && make fv'
        env_vars:
          - name: USE_UBI_AS_CALICO_BASE
            value: '1'
    epilogue:
      always:
        commands:
          - 'test-results publish --ignore-missing ./report/*.xml ../felix/report/*.xml --suite-prefix="$TEST_SUITE_PREFIX" --name "Typha" || true'
