- name: API Server
  run:
    when: "${CHANGE_IN(apiserver)}"
  execution_time_limit:
    minutes: 30
  dependencies:
    - Prerequisites
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "calico-image"
    prologue:
      commands:
        - cd apiserver
    jobs:
      - name: "API Server: CI"
        commands:
          - ../.semaphore/run-and-monitor make-ci.log make ci
        env_vars:
          - name: STORE_BUILD_CACHE
            value: "true"
    epilogue:
      always:
        commands:
          - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
