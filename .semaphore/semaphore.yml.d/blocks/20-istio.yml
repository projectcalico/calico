- name: Istio
  run:
    when: "${CHANGE_IN(istio)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd istio
    jobs:
      - name: "Istio: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "Istio: multi-arch build"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor image-$ARCH.log make image ARCH=$ARCH
