- name: Istio
  run:
    when: "${CHANGE_IN(istio)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - cd istio
    jobs:
      - name: "Istio: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make ci
      - name: "Istio: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          # Cross-builds all istio components including ztunnel.
          # ztunnel uses Rust cross-compile via calico/rust-build's aarch64
          # toolchain (clang + sysroot), no native arm64 runner needed.
          - ../.semaphore/run-and-monitor build-$ARCH.log make build ARCH=$ARCH
