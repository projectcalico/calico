- name: Istio Ztunnel
  run:
    when: "change_in(['/third_party/istio-ztunnel'], {pipeline_file: 'ignore', exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE']${DEFAULT_BRANCH}})"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - export BRANCH_NAME=$SEMAPHORE_GIT_BRANCH
    jobs:
      - name: "Linux amd64"
        commands:
          - make -C third_party/istio-ztunnel build CONFIRM=true
- name: Istio Ztunnel - native arm64 runner
  run:
    when: "change_in(['/third_party/istio-ztunnel'], {pipeline_file: 'ignore', exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE']${DEFAULT_BRANCH}})"
  dependencies:
    - Prerequisites
  task:
    agent:
      machine:
        type: s1-aws-arm64-2
    prologue:
      commands:
        - export BRANCH_NAME=$SEMAPHORE_GIT_BRANCH
    jobs:
      - name: "Linux arm64"
        commands:
          - make -C third_party/istio-ztunnel build CONFIRM=true

- name: Istio
  run:
    when: "${CHANGE_IN(istio)}"
  dependencies:
    - Prerequisites
  task:
    prologue:
      commands:
        - export BRANCH_NAME=$SEMAPHORE_GIT_BRANCH
    jobs:
      - name: "Istio: CI"
        commands:
          - ../.semaphore/run-and-monitor ci.log make -C istio ci
      - name: "Istio: build arm64"
        matrix:
          - env_var: ARCH
            values:
              - arm64
        commands:
          - ../.semaphore/run-and-monitor build-$ARCH.log make -C istio build ARCH=$ARCH
