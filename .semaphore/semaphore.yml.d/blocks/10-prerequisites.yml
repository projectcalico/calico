- name: Check SemaphoreCI files
  run:
    when: >-
      ${FORCE_RUN} or
      change_in(['/.semaphore', '/hack', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'track'})
  dependencies: []
  task:
    jobs:
      - name: Check semaphore files
        commands:
          - make gen-semaphore-yaml
          - make check-dirty
- name: Check YAML files
  run:
    when: >-
      ${FORCE_RUN} or
      change_in(['/**/*.yml', '/**/*.yaml', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'track'})
  dependencies: []
  task:
    jobs:
      - name: Check YAML files
        commands:
          - make yaml-lint
- name: Check Go
  run:
    when: >-
      ${FORCE_RUN} or
      change_in(['/go.mod', '/go.sum', '/**/*.go', '/**/deps.txt', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'ignore'})
  dependencies: []
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "preflight-go-checks"
    agent:
      machine:
        type: f1-standard-4
        os_image: ubuntu2204
    jobs:
      - name: Check Go files
        env_vars:
          - name: STORE_BUILD_CACHE
            value: "true"
        commands:
          - make check-ginkgo-v2
          - make check-go-mod
          - make verify-go-mods
          - make gen-deps-files
          - make go-vet
          - >-
            if [ -n "$SEMAPHORE_GIT_PR_NUMBER" ]; then
              make fix-changed
            else
              make fix-all
            fi
          - make check-dirty
- name: Check Python
  run:
    when: >-
      ${FORCE_RUN} or
      change_in(['/networking-calico', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'ignore'})
  dependencies: []
  task:
    jobs:
      - name: Check Python files
        commands:
          - make -C networking-calico fmtpy
          - make -C networking-calico flake8
          - make check-dirty
- name: Check language/Dockerfiles
  run:
    when: >-
      ${FORCE_RUN} or
      change_in(['/**/*'], {pipeline_file: 'track', exclude: ['libbpf', '.[a-z]*']})
  dependencies: []
  task:
    jobs:
      - name: Check language/Dockerfiles
        commands:
          # These are very quick grep checks so we combine them into one job.
          - make check-language
          - make check-dockerfiles
          - make check-mockery-config
- name: Check protobufs
  run:
    when: >-
      ${FORCE_RUN} or
      change_in(['/**/*.pb.go', '/**/*.proto', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'ignore'})
  dependencies: []
  task:
    jobs:
      - name: Check protobufs
        commands:
          - make protobuf fix-changed
          - make check-dirty
- name: Manifests and API docs
  run:
    when: >-
      ${FORCE_RUN} or
      change_in(['/api', '/manifests', '/charts', '/libcalico-go/lib/apis', '/libcalico-go/config', '/libcalico-go/Makefile', '/felix/config', '/felix/docs', '/felix/Makefile', '/goldmane', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'ignore'})
  dependencies: []
  task:
    jobs:
      - name: Check manifests and API docs
        commands:
          - make -C lib gen-files
          - make -C api gen-files
          - make -C libcalico-go gen-files
          - make -C felix gen-files
          - make -C goldmane gen-files
          - make gen-manifests
          - make fix-changed
          - make check-ocp-no-crds
          - make check-dirty
- name: Store working copy
  run:
    when: "branch =~ '.*'"
  dependencies: []
  task:
    env_vars:
      - name: SKIP_CACHE_RESTORE
        value: "true"
    jobs:
      - name: Save working copy to cache
        commands:
          - cd ..
          - tar --use-compress-program="zstd -3" -cf /tmp/working-copy.tar.zstd $CALICO_DIR_NAME
          - gcs_branch_cache_dir="${GCS_CACHE_DIR}/${SEMAPHORE_GIT_BRANCH}"
          - gcloud storage cp /tmp/working-copy.tar.zstd "$gcs_branch_cache_dir/working-copy.tar.zstd"

- name: "Build: nftables RPMs"
  # Producer for the patched nftables + libnftnl RPMs that calico/node and the
  # istio CNI install image consume. The image tag is content-addressed (sha
  # of specs+patches+versions in hack/rpms/nftables/Makefile), so on cache hit
  # this block is just a `docker manifest inspect` + GCS upload of the
  # pre-existing tarball. On cache miss, it builds (~16-20 min on emulated
  # arches) and uploads the image tarball to GCS for downstream consumers.
  # Publishing to Docker Hub happens in a separate post-build promotion
  # (push-images/nft-rpms.yml) so PR workflows never receive the push credential.
  run:
    when: "true"
  dependencies: []
  task:
    agent:
      machine:
        type: f1-standard-4
        os_image: ubuntu2204
    prologue:
      commands:
        - mkdir logs
        - export BUILD_LOG="logs/build-nft-rpms-${ARCH}.log"
    epilogue:
      always:
        commands:
          - artifact push job logs --destination semaphore/logs || true
    jobs:
      - name: "Build/cache nftables RPMs"
        matrix:
          - env_var: ARCH
            values:
              - amd64
              - arm64
              - ppc64le
              - s390x
        commands:
          - .semaphore/scripts/build-nft-rpms.sh "${ARCH}"

- name: "Pull: go-build image"
  # Populate the GCS cache of calico/go-build so that every downstream job can
  # docker-load it from GCS (faster, and avoids Docker Hub rate limits) rather
  # than pulling cold from Docker Hub. The cache is keyed by GO_BUILD_VER so
  # the tarball survives across workflows — the common case is a no-op
  # `gcloud storage ls` on a cache hit.
  run:
    when: "true"
  dependencies: []
  task:
    env_vars:
      - name: SKIP_CACHE_RESTORE
        value: "true"
    jobs:
      - name: "Cache calico/go-build to GCS"
        commands:
          - GO_BUILD_VER=$(grep -E '^GO_BUILD_VER[[:space:]]*=' metadata.mk | cut -d'=' -f2 | tr -d '[:space:]')
          - cache_path="gs://${GCS_BUILD_CACHE_BUCKET}/images/calico-go-build-${GO_BUILD_VER}.tar.zst"
          - |-
            if gcloud storage ls "$cache_path" >/dev/null 2>&1; then
              echo "Cache hit for calico/go-build:${GO_BUILD_VER}"
            else
              echo "Cache miss for calico/go-build:${GO_BUILD_VER}, pulling and uploading"
              docker pull "calico/go-build:${GO_BUILD_VER}"
              docker save "calico/go-build:${GO_BUILD_VER}" -o /tmp/go-build.tar
              zstd -3 --rm /tmp/go-build.tar
              gcloud storage cp /tmp/go-build.tar.zst "$cache_path"
            fi
- name: "Build: calico image"
  # Always build and cache the calico image so that downstream CI blocks can
  # load it from GCS instead of rebuilding per component. This block is the
  # sole producer for the "calico" build-cache group — every Go component
  # block on master restores the module + build cache populated here.
  run:
    when: "true"
  dependencies: []
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "calico"
    agent:
      machine:
        type: f1-standard-4
        os_image: ubuntu2204
    jobs:
      - name: "Build and cache calico image"
        env_vars:
          - name: STORE_BUILD_CACHE
            value: "true"
        commands:
          - make -C cmd/calico image
          # Also build the cgo and race variants so their GOCACHE fingerprints
          # land in the shared build cache. Felix FV consumes calico-cgo (for
          # BPF) or calico-race (when FV_RACE_DETECTOR_ENABLED=true).
          - make -C cmd/calico build-cgo build-race
          - docker save calico/calico:latest-amd64 -o /tmp/calico-image.tar
          - zstd -3 --rm /tmp/calico-image.tar
          - gcloud storage cp /tmp/calico-image.tar.zst "${GCS_WORKFLOW_DIR}/calico-image.tar.zst"
          # Upload the cgo + race binaries so Felix FV can consume them
          # directly instead of rebuilding. Felix Build downloads these into
          # cmd/calico/bin/ so the working-copy tarball carries them through
          # to the test VMs.
          - gcloud storage cp cmd/calico/bin/calico-cgo-amd64 "${GCS_WORKFLOW_DIR}/calico-cgo-amd64"
          - gcloud storage cp cmd/calico/bin/calico-race-amd64 "${GCS_WORKFLOW_DIR}/calico-race-amd64"
          # Upload the libbpf clone + compiled static lib. `make -C
          # cmd/calico build-cgo` above transitively built it via the Felix
          # CGO dependency chain; the test-or-build below keeps this a
          # no-op on a warm tree but still produces the artifact if the
          # dependency chain is ever severed. Consumers (Felix: Build,
          # Felix: UT) extract this into felix/bpf-gpl/ to skip the clone,
          # avoiding the known github.com/libbpf/libbpf HTTP 500 flake
          # and saving the ~30s build step across all Felix jobs.
          - test -f felix/bpf-gpl/libbpf/src/amd64/libbpf.a || make -C felix libbpf
          - LIBBPF_VERSION=$(grep -E '^LIBBPF_VERSION[[:space:]]*=' metadata.mk | cut -d'=' -f2 | tr -d '[:space:]')
          # Fail loudly if either path is missing. Without this guard, tar would
          # warn and still exit 0 on a missing path, and every downstream Felix
          # job would silently regress to cold libbpf builds.
          - test -d felix/bpf-gpl/libbpf || (echo "ERROR libbpf clone missing at felix/bpf-gpl/libbpf" >&2; exit 1)
          - test -f "felix/bpf-gpl/.libbpf-${LIBBPF_VERSION}" || (echo "ERROR libbpf version marker felix/bpf-gpl/.libbpf-${LIBBPF_VERSION} missing" >&2; exit 1)
          - tar --use-compress-program="zstd -3" -cf /tmp/libbpf-amd64.tar.zst -C felix/bpf-gpl libbpf ".libbpf-${LIBBPF_VERSION}"
          - gcloud storage cp /tmp/libbpf-amd64.tar.zst "${GCS_WORKFLOW_DIR}/libbpf-amd64.tar.zst"
- name: "Build: node image"
  # Builds the node image on top of the combined calico binary. calico/node is
  # still the canonical DaemonSet image for OSS users, so it continues to ship
  # alongside the unified calico image. The underlying Go state lives in the
  # "calico" build cache populated by "Build: calico image" — only the Docker
  # stage assembly (copying binaries onto the base image) runs here, not the Go
  # compile. Kept in prerequisites (rather than 20-node.yml) so consumer blocks
  # can depend on the shared producer→GCS→consumer upload pattern.
  run:
    when: "${CHANGE_IN(node)}"
  dependencies:
    - "Build: nftables RPMs"
  task:
    agent:
      machine:
        type: f1-standard-4
        os_image: ubuntu2204
    jobs:
      - name: "Build and cache node image"
        commands:
          # Load the patched nftables RPMs producer image (built/cached by
          # "Build: nftables RPMs") so the node Dockerfile's FROM ${NFT_RPMS_IMAGE}
          # resolves locally without re-pulling from Docker Hub.
          - gcloud storage cp "${GCS_WORKFLOW_DIR}/nft-rpms-amd64.tar.zst" /tmp/nft-rpms.tar.zst
          - zstd -d --rm /tmp/nft-rpms.tar.zst
          - docker load -i /tmp/nft-rpms.tar
          - rm -f /tmp/nft-rpms.tar
          - make -C node image
          - docker save calico/node:latest-amd64 -o /tmp/node-image.tar
          - zstd -3 --rm /tmp/node-image.tar
          - gcloud storage cp /tmp/node-image.tar.zst "${GCS_WORKFLOW_DIR}/node-image.tar.zst"
- name: "Build: whisker image"
  # Whisker is a TypeScript/React frontend that won't consolidate into the
  # calico binary — it ships as its own image indefinitely. No Go build cache
  # to populate; only produces the image tarball for consumer blocks.
  run:
    when: >-
      ${FORCE_RUN} or
      change_in(['/metadata.mk', '/lib.Makefile', '/whisker/'], {pipeline_file: 'ignore', exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE']})
  dependencies: []
  task:
    jobs:
      - name: "Build and cache whisker image"
        commands:
          - make -C whisker image
          - docker save calico/whisker:latest-amd64 -o /tmp/whisker-image.tar
          - zstd -3 --rm /tmp/whisker-image.tar
          - gcloud storage cp /tmp/whisker-image.tar.zst "${GCS_WORKFLOW_DIR}/whisker-image.tar.zst"
- name: Prerequisites
  skip:
    # Always skip, this is a dummy job used to group prerequisite checks.
    # Only the pre-flight checks gate on this; the per-image build blocks are
    # wired in directly as dependencies on the consumer blocks that actually
    # load those cached images, so unrelated component blocks don't serialize
    # behind them.
    when: "true"
  dependencies:
    - Check SemaphoreCI files
    - Check YAML files
    - Check Go
    - Check Python
    - Check language/Dockerfiles
    - Check protobufs
    - Manifests and API docs
    - Store working copy
    - "Pull: go-build image"
  task:
    jobs:
      - name: Pre-flight checks
        commands:
          - "true"
