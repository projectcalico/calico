- name: "E2E tests (cluster routing: BIRD)"
  run:
    when: "${CHANGE_IN(e2e,node,typha,apiserver,cni-plugin,pod2daemon,calicoctl,kube-controllers,goldmane,whisker,whisker-backend)}"
  dependencies:
    - Prerequisites
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "e2e-tests"
    agent:
      machine:
        type: f1-standard-4
        os_image: ubuntu2204
    jobs:
      - name: "E2E tests: Conformance (cluster routing: BIRD)"
        commands:
          - .semaphore/run-and-monitor e2e-test.log make e2e-test
        env_vars:
          - name: CLUSTER_ROUTING
            value: "BIRD"
          - name: STORE_BUILD_CACHE
            value: "true"
    epilogue:
      always:
        commands:
          - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
- name: "E2E tests (cluster routing: Felix)"
  run:
    when: "${CHANGE_IN(e2e,node,typha,apiserver,cni-plugin,pod2daemon,calicoctl,kube-controllers,goldmane,whisker,whisker-backend)}"
  dependencies:
    - Prerequisites
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "e2e-tests"
    agent:
      machine:
        type: f1-standard-4
        os_image: ubuntu2204
    jobs:
      - name: "E2E tests: Conformance (cluster routing: Felix)"
        commands:
          - .semaphore/run-and-monitor e2e-test-felix-routing.log make e2e-test
        env_vars:
          - name: CLUSTER_ROUTING
            value: "FELIX"
          - name: E2E_SKIP
            value: "BGP"
          - name: STORE_BUILD_CACHE
            value: "true"
    epilogue:
      always:
        commands:
          - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
