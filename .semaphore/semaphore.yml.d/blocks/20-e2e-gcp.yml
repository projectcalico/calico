- name: "E2E tests on GCP kubeadm (local binary)"
  run:
    when: "${FORCE_RUN} or change_in(['/e2e/**'], {pipeline_file: 'ignore', exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE']})"
  dependencies:
    - Prerequisites
  task:
    secrets:
      - name: marvin-github-ssh-private-key
      - name: banzai-secrets
    prologue:
      commands:
        - checkout
        - source .semaphore/end-to-end/scripts/global_prologue.sh
    epilogue:
      always:
        commands:
          - ~/calico/.semaphore/end-to-end/scripts/global_epilogue.sh
    env_vars:
      - name: TEST_TYPE
        value: k8s-e2e
      - name: PRODUCT
        value: calico
      - name: FUNCTIONAL_AREA
        value: "e2e-gcp.yml"
      - name: RUN_LOCAL_TESTS
        value: "true"
      - name: USE_PRIVATE_REGISTRY
        value: "true"
      - name: PRIVATE_REGISTRY
        value: "quay.io/"
      - name: K8S_E2E_FLAGS
        # Label filter selects sig-calico tests and excludes:
        # - Slow: long-running tests not suitable for CI
        # - Disruptive: tests that break cluster state for other tests
        # - RequiresBGPMesh: requires BGP routing, but this cluster uses VXLAN
        # - NoEncap: requires non-encapsulated routing, but this cluster uses VXLAN
        # - Feature:Istio: Calico policy not enforced with Istio ambient on BPF dataplane
        # - ExternalNode: requires a non-cluster node with EXT_IP/EXT_KEY/EXT_USER configured
        # - RequiresXtables: requires iptables or nftables dataplane, but this cluster uses BPF
        value: "--ginkgo.label-filter=sig-calico&&!Slow&&!Disruptive&&!RequiresBGPMesh&&!NoEncap&&!Feature:Istio&&!ExternalNode&&!RequiresXtables"
      - name: USE_API_SERVER
        value: "false"
    jobs:
      - name: gcp-kubeadm - e2e local binary
        execution_time_limit:
          hours: 3
        commands:
          - ~/calico/.semaphore/end-to-end/scripts/body_standard.sh
        matrix:
          - env_var: PROVISIONER
            values: ["gcp-kubeadm"]
          - env_var: K8S_VERSION
            values: ["stable"]
          - env_var: INSTALLER
            values: ["operator"]
          - env_var: DATAPLANE
            values: ["CalicoBPF"]
