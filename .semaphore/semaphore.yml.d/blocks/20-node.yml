- name: "Node: Static checks and UT"
  run:
    when: "${CHANGE_IN(node)}"
  dependencies:
    - Prerequisites
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "calico"
    agent:
      machine:
        type: f1-standard-4
        os_image: ubuntu2204
    prologue:
      commands:
        - cd node
    # Image builds (image, image-windows) are handled by the Prerequisites
    # "Build: node image" block and the "Node: multi-arch build" block
    # respectively, so we only run the unique checks here.
    jobs:
      - name: "Node: Static checks"
        priority:
          # This job is on the critical path so we increase its priority.
          - value: 51
            when: "pull_request =~ '.+'"
        commands:
          - ../.semaphore/run-and-monitor static-checks.log make static-checks
      - name: "Node: UT"
        priority:
          # This job is on the critical path so we increase its priority.
          - value: 51
            when: "pull_request =~ '.+'"
        commands:
          - ../.semaphore/run-and-monitor ut.log make ut
    epilogue:
      always:
        commands:
          - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
- name: "Node: multi-arch build"
  run:
    when: "${CHANGE_IN(node)}"
  dependencies:
    - Prerequisites
    - "Build: nftables RPMs"
  task:
    prologue:
      commands:
        - cd node
    jobs:
      - name: "Node: build multi-arch images"
        matrix:
          - env_var: ARCH
            values:
              - arm64
              - ppc64le
              - s390x
        commands:
          # Load the per-arch patched nftables RPMs producer image (built/cached
          # by "Build: nftables RPMs") so Dockerfile's FROM ${NFT_RPMS_IMAGE}
          # resolves locally without re-pulling from Docker Hub.
          - gcloud storage cp "${GCS_WORKFLOW_DIR}/nft-rpms-${ARCH}.tar.zst" /tmp/nft-rpms.tar.zst
          - zstd -d --rm /tmp/nft-rpms.tar.zst
          - docker load -i /tmp/nft-rpms.tar
          - rm -f /tmp/nft-rpms.tar
          - ../.semaphore/run-and-monitor image-$ARCH.log make image ARCH=$ARCH
      - name: "Node: build Windows archive"
        commands:
          - ../.semaphore/run-and-monitor build-windows-archive.log make build-windows-archive
      - name: "Node: build Windows image"
        commands:
          - ../.semaphore/run-and-monitor build-windows-image.log make image-windows
- name: "Node: kind-cluster tests"
  run:
    # KinD tests also build and run all the other images.
    when: "${CHANGE_IN(node,typha,apiserver,cni-plugin,pod2daemon,calicoctl,kube-controllers,goldmane,whisker,whisker-backend,cmd/calico,non-go:/.semaphore/vms/)}"
  dependencies:
    - "Prerequisites"
  task:
    env_vars:
      - name: BUILD_CACHE_GROUP
        value: "calico"
      - name: CI_GROUP_LABEL
        value: "calico"
      - name: CI_JOB_LABEL
        value: "kind-cluster-tests"
    prologue:
      commands:
        # Set up access to GCP buckets.
        - export GOOGLE_APPLICATION_CREDENTIALS=$HOME/secrets/secret.google-service-account-key.json
        - gcloud auth activate-service-account --key-file=$GOOGLE_APPLICATION_CREDENTIALS
        - gcloud config set project unique-caldron-775
        - cd node
        - export SHORT_WORKFLOW_ID=$(echo ${SEMAPHORE_WORKFLOW_ID} | sha256sum | cut -c -8)
        - export ZONE=europe-west3-c
        - export VM_PREFIX=sem-${SEMAPHORE_PROJECT_NAME}-${SHORT_WORKFLOW_ID}-kind-
        - echo VM_PREFIX=${VM_PREFIX}
        - export COMPONENT=node
        - export VM_DISK_SIZE=80GB
        - mkdir artifacts
        - ./.semaphore/cache-test-artifacts
    jobs:
      - name: "Node: kind-cluster tests"
        execution_time_limit:
          minutes: 120
        env_vars:
          - name: JOB_TIMEOUT_MINUTES
            value: "120"
        commands:
          - ../.semaphore/vms/run-tests-on-vms ${VM_PREFIX}
    epilogue:
      always:
        commands:
          - '../.semaphore/vms/publish-reports "Node: KinD STs"'
          - ../.semaphore/vms/clean-up-vms ${VM_PREFIX}
    secrets:
      - name: google-service-account-for-gce
