version: v1.0
name: Renovate update dependencies
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2204

execution_time_limit:
  hours: 2

global_job_config:
  secrets:
    - name: private-repo
  prologue:
    commands:
      - chmod 0600 ~/.keys/*
      - ssh-add ~/.keys/*
      - checkout

blocks:
  - name: Run Renovate
    task:
      secrets:
        - name: marvin-renovate-token
      jobs:
        - name: Renovate
          env_vars:
            - name: RENOVATE_REPOSITORIES
              value: projectcalico/calico
            - name: RENOVATE_ALLOWED_COMMANDS
              value: '["^make gen-deps-files$"]'
            - name: RENOVATE_GIT_AUTHOR
              value: "marvin-tigera <marvin-tigera@users.noreply.github.com>"
            - name: LOG_LEVEL
              value: info
          commands:
            - nvm install 24 && nvm use 24
            - npm install -g renovate@43
            - renovate --platform=github --autodiscover=false
