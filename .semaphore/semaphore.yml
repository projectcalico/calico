        - name: "Felix: UT"
          execution_time_limit:
            minutes: 30
          commands:
            - ../.semaphore/run-and-monitor ut.log make ut
        - name: "Felix: k8sfv"
          execution_time_limit:
            minutes: 15
          commands:
            # REMOTE_DEPS= relies on the prologue having preloaded the calico
            # image + cgo/race binaries (see Felix: Build and cache FV prerequisites
            # for details).
            - ../.semaphore/run-and-monitor k8sfv-typha.log make REMOTE_DEPS= k8sfv-test JUST_A_MINUTE=true USE_TYPHA=true
            - ../.semaphore/run-and-monitor k8sfv-no-typha.log make REMOTE_DEPS= k8sfv-test JUST_A_MINUTE=true USE_TYPHA=false
      epilogue:
        always:
          commands:
            - ./.semaphore/analyze-test-failures --ut || true
            - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
