  - name: "E2E tests on GCP kubeadm (local binary)"
    run:
      when: >-
        false or change_in(['/e2e/**', '/.semaphore/end-to-end/scripts/'],
        {pipeline_file: 'ignore', exclude: ['/**/.gitignore', '/**/README.md', '/**/LICENSE']})
    dependencies:
      - Prerequisites
    task:
      secrets:
        - name: marvin-github-ssh-private-key
        - name: banzai-secrets
      prologue:
        commands:
          - checkout
          - source .semaphore/end-to-end/scripts/global_prologue.sh
      epilogue:
        always:
          commands:
            - ~/calico/.semaphore/end-to-end/scripts/global_epilogue.sh
      env_vars:
        - name: TEST_TYPE
          value: k8s-e2e
        - name: PRODUCT
          value: calico
        - name: FUNCTIONAL_AREA
          value: "e2e-gcp.yml"
        - name: USE_PRIVATE_REGISTRY
          value: "true"
        - name: PRIVATE_REGISTRY
          value: "quay.io/"
        - name: RUN_LOCAL_TESTS
          value: "true"
        - name: E2E_TEST_CONFIG
          # Test selection is driven by the config file; see gcp-bpf.yaml for the
          # include/exclude rationale.
          value: "e2e/config/gcp-bpf.yaml"
        - name: USE_API_SERVER
          value: "false"
        - name: ENABLE_EXTERNAL_NODE
          value: "true"
      jobs:
        - name: gcp-kubeadm - e2e local binary
          execution_time_limit:
            hours: 3
          commands:
            - ~/calico/.semaphore/end-to-end/scripts/body_standard.sh
          matrix:
            - env_var: PROVISIONER
              values: ["gcp-kubeadm"]
            - env_var: K8S_VERSION
              values: ["stable"]
            - env_var: INSTALLER
              values: ["operator"]
            - env_var: DATAPLANE
              values: ["CalicoBPF"]
