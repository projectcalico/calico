        '/**/CONTRIBUTING*',
        '/**/DEVELOPER_GUIDE*',
        '/**/LICENSE*',
        '/**/README*',
        '/**/SECURITY.md']})
    dependencies:
      - Prerequisites
      - "Build: nftables RPMs"
    task:
      prologue:
        commands:
          - cd istio
      jobs:
        - name: "Istio: CI"
          commands:
            # Load the amd64 patched nftables RPMs producer image so the
            # install-cni Dockerfile's FROM ${NFT_RPMS_IMAGE} resolves locally.
            - gcloud storage cp "${GCS_WORKFLOW_DIR}/nft-rpms-amd64.tar.zst" /tmp/nft-rpms.tar.zst
            - zstd -d --rm /tmp/nft-rpms.tar.zst
            - docker load -i /tmp/nft-rpms.tar
            - rm -f /tmp/nft-rpms.tar
            # Include the istio ztunnel build in the amd64 CI job.
            - ../.semaphore/run-and-monitor ci.log make ci
        - name: "Istio: build arm64"
          matrix:
            - env_var: ARCH
              values:
                - arm64
          commands:
            # Skip istio ztunnel in this arm64 cross-build job.
            # ztunnel is built separately in the native arm64 runner block below.
            - ../.semaphore/run-and-monitor build-$ARCH.log make build-istio ARCH=$ARCH
  - name: Istio Ztunnel - native arm64 runner
    run:
      when: >-
        change_in(['/.semaphore/semaphore.yml.d/01-preamble.yml',
        '/.semaphore/semaphore.yml.d/02-global_job_config.yml',
