        '/.semaphore/semaphore.yml.d/blocks/20-e2e.yml',
        '/.semaphore/semaphore.yml.d/blocks/20-felix.yml',
        '/.semaphore/semaphore.yml.d/blocks/20-istio.yml',
        '/.semaphore/semaphore.yml.d/blocks/20-kubevirt-live-migration.yml',
