    dependencies:
      - Prerequisites
      - "Build: nftables RPMs"
    task:
      prologue:
        commands:
          - cd node
      jobs:
        - name: "Node: build multi-arch images"
          matrix:
            - env_var: ARCH
              values:
                - arm64
                - ppc64le
                - s390x
          commands:
            # Load the per-arch patched nftables RPMs producer image (built/cached
            # by "Build: nftables RPMs") so Dockerfile's FROM ${NFT_RPMS_IMAGE}
            # resolves locally without re-pulling from Docker Hub.
            - gcloud storage cp "${GCS_WORKFLOW_DIR}/nft-rpms-${ARCH}.tar.zst" /tmp/nft-rpms.tar.zst
            - zstd -d --rm /tmp/nft-rpms.tar.zst
            - docker load -i /tmp/nft-rpms.tar
            - rm -f /tmp/nft-rpms.tar
            - ../.semaphore/run-and-monitor image-$ARCH.log make image ARCH=$ARCH
        - name: "Node: build Windows archive"
          commands:
            - ../.semaphore/run-and-monitor build-windows-archive.log make build-windows-archive
        - name: "Node: build Windows image"
          commands:
            - ../.semaphore/run-and-monitor build-windows-image.log make image-windows
  - name: "Node: kind-cluster tests"
    run:
      # KinD tests also build and run all the other images.
      when: >-
        change_in(['/.semaphore/semaphore.yml.d/01-preamble.yml',
