    dependencies:
      - Prerequisites
      - "Build: calico image"
    task:
      env_vars:
        - name: BUILD_CACHE_GROUP
          value: "calico"
        # Fail loud if `make` tries to clone libbpf — the prologue restores
        # the pre-built tarball from GCS, and a re-clone would negate the
        # cache and re-expose the github.com/libbpf HTTP 500 flake.
        - name: NO_LIBBPF_CLONE
          value: "true"
      prologue:
        commands:
          # Load the pre-built calico image (touches the marker so the nested
          # `make -C cmd/calico image` invocation inside fv-prereqs is a no-op)
          # and pull the cgo + race binaries into place so build-calico-cgo /
          # build-calico-race skip their rebuilds.
          - .semaphore/load-cached-images
          - mkdir -p cmd/calico/bin
          - gcloud storage cp "${GCS_WORKFLOW_DIR}/calico-cgo-amd64" cmd/calico/bin/calico-cgo-amd64
          - gcloud storage cp "${GCS_WORKFLOW_DIR}/calico-race-amd64" cmd/calico/bin/calico-race-amd64
          - chmod +x cmd/calico/bin/calico-cgo-amd64 cmd/calico/bin/calico-race-amd64
          # Extract the pre-built libbpf (clone + compiled amd64/libbpf.a)
          # produced by "Build: calico image". Verify the compiled static
          # lib landed so a broken tarball fails fast rather than triggering
          # the NO_LIBBPF_CLONE guard mid-build.
          - gcloud storage cp "${GCS_WORKFLOW_DIR}/libbpf-amd64.tar.zst" /tmp/libbpf-amd64.tar.zst
          - tar --use-compress-program="zstd -d" -xf /tmp/libbpf-amd64.tar.zst -C felix/bpf-gpl
          - test -f felix/bpf-gpl/libbpf/src/amd64/libbpf.a || (echo "ERROR libbpf tarball missing compiled libbpf.a" >&2; exit 1)
          - cd felix
          - gcloud config set project unique-caldron-775
          - gcloud auth activate-service-account --key-file=$HOME/secrets/secret.google-service-account-key.json
      secrets:
        - name: google-service-account-for-gce
        - name: gemini-api-key
        - name: fv-tests-guru-github-token
        - name: fv-guru-db
      jobs:
        - name: "Felix: Build and cache FV prerequisites"
          priority:
          # This job is on the critical path so we increase its priority.
            - value: 51
              when: "pull_request =~ '.+'"
          execution_time_limit:
            minutes: 20
          commands:
            # Skip `make build` (which on amd64 also cross-compiles
            # bin/calico-felix.exe) since the Windows binary is produced by the
            # dedicated "Felix: Build Windows binaries" block and nothing in the
            # Linux FV path consumes it.
            #
            # REMOTE_DEPS= overrides the Makefile's default which would invoke
            # `make -C cmd/calico image` and `make -C cmd/calico build-race`;
            # the calico-image producer block has already built those and the
            # prologue preloaded the image and race binary.
            - make REMOTE_DEPS= bin/calico-felix image ut-bpf-prereqs fv-prereqs
            - ./.semaphore/cache-test-artifacts
        - name: "Felix: Static checks"
          priority:
            # This job is on the critical path so we increase its priority.
            - value: 51
              when: "pull_request =~ '.+'"
          execution_time_limit:
            minutes: 15
          commands:
            - ../.semaphore/run-and-monitor static-checks.log make static-checks
      epilogue:
        always:
          commands:
            - ./.semaphore/analyze-test-failures --ut || true
            - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
