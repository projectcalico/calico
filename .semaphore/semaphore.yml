          os_image: ubuntu2204
      prologue:
        commands:
          - cd node
      # Image builds (image, image-windows) are handled by the Prerequisites
      # "Build: node image" block and the "Node: multi-arch build" block
      # respectively, so we only run the unique checks here.
      jobs:
        - name: "Node: Static checks"
