version: v1.0
name: Calico
execution_time_limit:
  hours: 4
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204
auto_cancel:
  running:
    when: "branch != 'master'"
  queued:
    when: "branch != 'master'"
global_job_config:
  secrets:
    - name: docker-hub
    - name: google-service-account-for-gce
  env_vars:
    - name: GOOGLE_PROJECT
      value: unique-caldron-775
    - name: GCS_BUILD_CACHE_BUCKET
      value: calico-transient-build-artifacts-europe-west3
    - name: BUILDKIT_PROGRESS
      value: plain
    - name: SEMAPHORE_AGENT_UPLOAD_JOB_LOGS
      value: when-trimmed
  prologue:
    commands:
      - export CALICO_DIR_NAME=${SEMAPHORE_GIT_DIR}
      - export GCS_CACHE_DIR=gs://$GCS_BUILD_CACHE_BUCKET/cache/${CALICO_DIR_NAME}
      - export GCS_WORKFLOW_DIR=gs://$GCS_BUILD_CACHE_BUCKET/workflow/${SEMAPHORE_WORKFLOW_ID}
      - export GOOGLE_APPLICATION_CREDENTIALS=$HOME/secrets/secret.google-service-account-key.json
      - |-
        if [[ $(uname -m) != "x86_64" || -n "$ARCH" ]]; then
          echo "Non-x86_64 build: $(uname -m) / $ARCH";
          export BUILD_CACHE_GROUP=$BUILD_CACHE_GROUP-$(uname -m)-$ARCH;
        fi
      - gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS" || true
      - gcloud config set project ${GOOGLE_PROJECT} || true
      # Try to restore the working copy from the cache, if available. Then,
      # for PRs, also try to restore the build cache.  (We skip this on branch
      # builds to ensure branches build cleanly.)
      - sudo apt-get install -y zstd || true
      - restored_wc_cache=false
      - |-
        if [[ -n "${SEMAPHORE_GIT_BRANCH}" && -z "$SKIP_CACHE_RESTORE" ]]; then
          echo "Looking for cached working copy for branch ${SEMAPHORE_GIT_BRANCH}"
          gcs_branch_cache_dir="${GCS_CACHE_DIR}/${SEMAPHORE_GIT_BRANCH}"
          if gcloud storage cp "$gcs_branch_cache_dir/working-copy.tar.zstd" /tmp/working-copy.tar.zstd; then
            echo "Restoring cache for branch ${SEMAPHORE_GIT_BRANCH}"
            tar --use-compress-program=zstd -xf /tmp/working-copy.tar.zstd & tar_pid=$!
            downloaded_build_cache=false
            if [[ -n "$BUILD_CACHE_GROUP" && -n "${SEMAPHORE_GIT_PR_NUMBER}" ]]; then
              if gcloud storage cp "$gcs_branch_cache_dir/build-cache-${BUILD_CACHE_GROUP}.tar.zstd" /tmp/build-cache.tar.zstd; then
                echo "Found build cache for group ${BUILD_CACHE_GROUP}"
                downloaded_build_cache=true
              fi
            fi
            if wait $tar_pid; then
              restored_wc_cache=true
            else
              echo "ERROR: Failed to extract working copy"
              restored_wc_cache=false
            fi
            if ${downloaded_build_cache}; then
              echo "Extracting build cache"
              tar --use-compress-program=zstd -xf /tmp/build-cache.tar.zstd -C .
              rm /tmp/build-cache.tar.zstd
            fi
            cd "${CALICO_DIR_NAME}"
          fi
        fi || true
      - |-
        if [[ ${restored_wc_cache} != true && -z "$SKIP_CHECKOUT" ]]; then
          echo "No cache restored, doing a fresh checkout..."
          cd $HOME
          rm -rf "${CALICO_DIR_NAME}"
          git clone --filter=blob:none $SEMAPHORE_GIT_URL $CALICO_DIR_NAME
          cd "${CALICO_DIR_NAME}" || exit 1
        fi
      - |-
        if [[ -z "$SKIP_CHECKOUT" ]]; then
          git fetch origin --tags --prune-tags ${SEMAPHORE_GIT_SHA}
          if [ "$SEMAPHORE_GIT_REF_TYPE" = "branch" ]; then
            git checkout ${SEMAPHORE_GIT_SHA} -B "${SEMAPHORE_GIT_BRANCH}"
          else
            git checkout ${SEMAPHORE_GIT_SHA}
          fi
          CALICO_DIR="$(pwd)"
          export CALICO_DIR
          mkdir -p artifacts
        fi
      - echo $DOCKERHUB_PASSWORD | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
      # Best-effort: load calico/go-build from the GCS cache populated by the
      # "Pull: go-build image" prerequisite job. Falls back to a Docker Hub pull
      # on cache miss. Skipped on non-x86_64 / cross-compile agents since the
      # cache is amd64-only.
      - |-
        if [[ $(uname -m) == "x86_64" && -z "$ARCH" ]]; then
          GO_BUILD_VER=$(grep -E '^GO_BUILD_VER[[:space:]]*=' metadata.mk | cut -d'=' -f2 | tr -d '[:space:]')
          image="calico/go-build:${GO_BUILD_VER}"
          if ! docker image inspect "$image" >/dev/null 2>&1; then
            cache_path="gs://${GCS_BUILD_CACHE_BUCKET}/images/calico-go-build-${GO_BUILD_VER}.tar.zst"
            if gcloud storage cp "$cache_path" /tmp/go-build.tar.zst 2>/dev/null; then
              echo "Loading ${image} from GCS cache"
              zstd -d --rm -o /tmp/go-build.tar /tmp/go-build.tar.zst
              docker load -i /tmp/go-build.tar
              rm -f /tmp/go-build.tar
            else
              echo "No GCS cache for ${image}, docker will pull from Docker Hub if needed"
            fi
          fi
        fi
  epilogue:
    commands:
      - cd $HOME
      - |-
        if [[ -z "${SEMAPHORE_GIT_PR_NUMBER}" && -n "$BUILD_CACHE_GROUP" && "$STORE_BUILD_CACHE" = "true" ]]; then
          echo "On branch, storing build cache group ${BUILD_CACHE_GROUP}"
          tar --use-compress-program="zstd -3" -cf /tmp/build-cache.tar.zstd go ${CALICO_DIR_NAME}/.go-pkg-cache
          gcs_branch_cache_dir="${GCS_CACHE_DIR}/${SEMAPHORE_GIT_BRANCH}"
          gcloud storage cp /tmp/build-cache.tar.zstd "$gcs_branch_cache_dir/build-cache-${BUILD_CACHE_GROUP}.tar.zstd"
        fi
      - cd "$CALICO_DIR"
      - .semaphore/publish-artifacts
promotions:
  # Manual promotion for publishing a hashrelease.
  - name: Publish hashrelease
    pipeline_file: release/hashrelease.yml
    parameters:
      env_vars:
        - required: true
          options:
            - "true"
            - "false"
          default_value: "false"
          description: "Build container images. If 'true', container images will be built as part of the hashrelease process."
          name: BUILD_CONTAINER_IMAGES
        - required: true
          options:
            - "true"
            - "false"
          default_value: "false"
          description: "create tarball of images. If 'true', a tarball of images will be added to the release.tgz. Requires BUILD_CONTAINER_IMAGES to also be 'true'."
          name: ARCHIVE_IMAGES
        - required: true
          options:
            - "true"
            - "false"
          default_value: "false"
          description: "publish images. If 'true', images will be pushed to the container registry/registries as part of the hashrelease process. Requires BUILD_CONTAINER_IMAGES to also be 'true'."
          name: PUBLISH_IMAGES
  # Manual promotion for publishing a release.
  - name: Publish official release
    pipeline_file: release/release.yml
  # Cleanup after ourselves if we are stopped-short.
  - name: Cleanup
    pipeline_file: cleanup.yml
    auto_promote:
      when: "result = 'stopped'"
  # Have separate promotions for publishing images so we can re-run
  # them individually if they fail, and so we can run them in parallel.
  - name: Push calico images
    pipeline_file: push-images/calico.yml
    auto_promote:
      when: "branch =~ 'master|release-.*'"
  - name: Push calico-node images
    pipeline_file: push-images/node.yml
    auto_promote:
      when: "branch =~ 'master|release-.*'"
  - name: Push cni-plugin images
    pipeline_file: push-images/cni-plugin.yml
    auto_promote:
      when: "branch =~ 'master|release-.*'"
  - name: Push mock calico-node images
    pipeline_file: push-images/mock-node.yml
    auto_promote:
      when: "branch =~ 'master|release-'"
  - name: Push Whisker images
    pipeline_file: push-images/whisker.yml
    auto_promote:
      when: "branch =~ 'master|release-.*'"
  - name: Push Envoy images
    pipeline_file: push-images/envoy.yml
    auto_promote:
      when: "branch =~ 'master|release-.*'"
  - name: Publish openstack packages
    pipeline_file: push-images/packaging.yaml
    auto_promote:
      when: "branch =~ 'master'"
  - name: Run Fossa scans
    pipeline_file: license-scanning/fossa-scan.yml
    auto_promote:
      when: "branch =~ 'master|release-.*'"
  - name: Push E2E images
    pipeline_file: push-images/e2e-test.yml
    auto_promote:
      when: "branch =~ 'master|release-.*'"
  - name: Push istio images
    pipeline_file: push-images/istio.yml
    auto_promote:
      when: "branch =~ 'master|release-.*'"
blocks:
  - name: Check images availability
    run:
      when: >-
        false or (branch !~ 'build-v.*' and change_in(['/charts/', '/manifests/'],
        {pipeline_file: 'ignore'}))
    dependencies: []
    task:
      jobs:
        - name: Check images availability
          commands:
            - make check-images-availability
  - name: Check SemaphoreCI files
    run:
      when: >-
        false or
        change_in(['/.semaphore', '/hack', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'track'})
    dependencies: []
    task:
      jobs:
        - name: Check semaphore files
          commands:
            - make gen-semaphore-yaml
            - make check-dirty
  - name: Check YAML files
    run:
      when: >-
        false or
        change_in(['/**/*.yml', '/**/*.yaml', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'track'})
    dependencies: []
    task:
      jobs:
        - name: Check YAML files
          commands:
            - make yaml-lint
  - name: Check Go
    run:
      when: >-
        false or
        change_in(['/go.mod', '/go.sum', '/**/*.go', '/**/deps.txt', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'ignore'})
    dependencies: []
    task:
      env_vars:
        - name: BUILD_CACHE_GROUP
          value: "preflight-go-checks"
      agent:
        machine:
          type: f1-standard-4
          os_image: ubuntu2204
      jobs:
        - name: Check Go files
          env_vars:
            - name: STORE_BUILD_CACHE
              value: "true"
          commands:
            - make check-ginkgo-v2
            - make check-go-mod
            - make verify-go-mods
            - make gen-deps-files
            - make go-vet
            - >-
              if [ -n "$SEMAPHORE_GIT_PR_NUMBER" ]; then
                make fix-changed
              else
                make fix-all
              fi
            - make check-dirty
  - name: Check Python
    run:
      when: >-
        false or
        change_in(['/networking-calico', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'ignore'})
    dependencies: []
    task:
      jobs:
        - name: Check Python files
          commands:
            - make -C networking-calico fmtpy
            - make -C networking-calico flake8
            - make check-dirty
  - name: Check language/Dockerfiles
    run:
      when: >-
        false or
        change_in(['/**/*'], {pipeline_file: 'track', exclude: ['libbpf', '.[a-z]*']})
    dependencies: []
    task:
      jobs:
        - name: Check language/Dockerfiles
          commands:
            # These are very quick grep checks so we combine them into one job.
            - make check-language
            - make check-dockerfiles
            - make check-mockery-config
  - name: Check protobufs
    run:
      when: >-
        false or
        change_in(['/**/*.pb.go', '/**/*.proto', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'ignore'})
    dependencies: []
    task:
      jobs:
        - name: Check protobufs
          commands:
            - make protobuf fix-changed
            - make check-dirty
  - name: Manifests and API docs
    run:
      when: >-
        false or
        change_in(['/api', '/manifests', '/charts', '/libcalico-go/lib/apis', '/libcalico-go/config', '/libcalico-go/Makefile', '/felix/config', '/felix/docs', '/felix/Makefile', '/goldmane', '/Makefile', '/lib.Makefile', '/metadata.mk'], {pipeline_file: 'ignore'})
    dependencies: []
    task:
      jobs:
        - name: Check manifests and API docs
          commands:
            - make -C lib gen-files
            - make -C api gen-files
            - make -C libcalico-go gen-files
            - make -C felix gen-files
            - make -C goldmane gen-files
            - make gen-manifests
            - make fix-changed
            - make check-ocp-no-crds
            - make check-dirty
  - name: Store working copy
    run:
      when: "branch =~ '.*'"
    dependencies: []
    task:
      env_vars:
        - name: SKIP_CACHE_RESTORE
          value: "true"
      jobs:
        - name: Save working copy to cache
          commands:
            - cd ..
            - tar --use-compress-program="zstd -3" -cf /tmp/working-copy.tar.zstd $CALICO_DIR_NAME
            - gcs_branch_cache_dir="${GCS_CACHE_DIR}/${SEMAPHORE_GIT_BRANCH}"
            - gcloud storage cp /tmp/working-copy.tar.zstd "$gcs_branch_cache_dir/working-copy.tar.zstd"
  - name: "Build: nftables RPMs"
    # Producer for the patched nftables + libnftnl RPMs that calico/node and the
    # istio CNI install image consume. The image tag is content-addressed (sha
    # of specs+patches+versions in hack/rpms/nftables/Makefile), so on cache hit
    # this block is just a `docker manifest inspect` + GCS upload of the
    # pre-existing tarball. On cache miss, it builds (~16-20 min on emulated
    # arches) and, on master/release branches, pushes to Docker Hub so
    # subsequent workflows hit the cache.
    run:
      when: "true"
    dependencies: []
    task:
      agent:
        machine:
          type: f1-standard-4
          os_image: ubuntu2204
      jobs:
        - name: "Build/cache nftables RPMs"
          matrix:
            - env_var: ARCH
              values:
                - amd64
                - arm64
                - ppc64le
                - s390x
          commands:
            - NFT_RPMS_TAG=$(make --no-print-directory -C hack/rpms/nftables print-tag)
            - NFT_RPMS_IMAGE="calico/nftables-rpms:${NFT_RPMS_TAG}-${ARCH}"
            - cache_path="${GCS_WORKFLOW_DIR}/nft-rpms-${ARCH}.tar.zst"
            - |-
              if docker manifest inspect "$NFT_RPMS_IMAGE" >/dev/null 2>&1; then
                echo "Cache hit for $NFT_RPMS_IMAGE, pulling"
                docker pull "$NFT_RPMS_IMAGE"
              else
                echo "Cache miss for $NFT_RPMS_IMAGE, building"
                docker run --privileged --rm tonistiigi/binfmt --install all
                make -C hack/rpms/nftables image ARCH="$ARCH"
                # SEMAPHORE_GIT_BRANCH is the PR target branch on PR builds (so it
                # equals "master" for every PR landing on master), not the source
                # branch — gate on SEMAPHORE_GIT_PR_NUMBER being empty to detect
                # an actual branch build before pushing.
                if [[ -z "${SEMAPHORE_GIT_PR_NUMBER}" && ( "$SEMAPHORE_GIT_BRANCH" == "master" || "$SEMAPHORE_GIT_BRANCH" == release-* ) ]]; then
                  docker push "$NFT_RPMS_IMAGE"
                fi
              fi
            - docker save "$NFT_RPMS_IMAGE" -o /tmp/nft-rpms.tar
            - zstd -3 --rm /tmp/nft-rpms.tar
            - gcloud storage cp /tmp/nft-rpms.tar.zst "$cache_path"
  - name: "Pull: go-build image"
    # Populate the GCS cache of calico/go-build so that every downstream job can
    # docker-load it from GCS (faster, and avoids Docker Hub rate limits) rather
    # than pulling cold from Docker Hub. The cache is keyed by GO_BUILD_VER so
    # the tarball survives across workflows — the common case is a no-op
    # `gcloud storage ls` on a cache hit.
    run:
      when: "true"
    dependencies: []
    task:
      env_vars:
        - name: SKIP_CACHE_RESTORE
          value: "true"
      jobs:
        - name: "Cache calico/go-build to GCS"
          commands:
            - GO_BUILD_VER=$(grep -E '^GO_BUILD_VER[[:space:]]*=' metadata.mk | cut -d'=' -f2 | tr -d '[:space:]')
            - cache_path="gs://${GCS_BUILD_CACHE_BUCKET}/images/calico-go-build-${GO_BUILD_VER}.tar.zst"
            - |-
              if gcloud storage ls "$cache_path" >/dev/null 2>&1; then
                echo "Cache hit for calico/go-build:${GO_BUILD_VER}"
              else
                echo "Cache miss for calico/go-build:${GO_BUILD_VER}, pulling and uploading"
                docker pull "calico/go-build:${GO_BUILD_VER}"
                docker save "calico/go-build:${GO_BUILD_VER}" -o /tmp/go-build.tar
                zstd -3 --rm /tmp/go-build.tar
                gcloud storage cp /tmp/go-build.tar.zst "$cache_path"
              fi
  - name: "Build: calico image"
    # Always build and cache the calico image so that downstream CI blocks can
    # load it from GCS instead of rebuilding per component. This block is the
    # sole producer for the "calico" build-cache group — every Go component
    # block on master restores the module + build cache populated here.
    run:
      when: "true"
    dependencies: []
    task:
      env_vars:
        - name: BUILD_CACHE_GROUP
          value: "calico"
      agent:
        machine:
          type: f1-standard-4
          os_image: ubuntu2204
      jobs:
        - name: "Build and cache calico image"
          env_vars:
            - name: STORE_BUILD_CACHE
              value: "true"
          commands:
            - make -C cmd/calico image
            # Also build the cgo and race variants so their GOCACHE fingerprints
            # land in the shared build cache. Felix FV consumes calico-cgo (for
            # BPF) or calico-race (when FV_RACE_DETECTOR_ENABLED=true).
            - make -C cmd/calico build-cgo build-race
            - docker save calico/calico:latest-amd64 -o /tmp/calico-image.tar
            - zstd -3 --rm /tmp/calico-image.tar
            - gcloud storage cp /tmp/calico-image.tar.zst "${GCS_WORKFLOW_DIR}/calico-image.tar.zst"
            # Upload the cgo + race binaries so Felix FV can consume them
            # directly instead of rebuilding. Felix Build downloads these into
            # cmd/calico/bin/ so the working-copy tarball carries them through
            # to the test VMs.
            - gcloud storage cp cmd/calico/bin/calico-cgo-amd64 "${GCS_WORKFLOW_DIR}/calico-cgo-amd64"
            - gcloud storage cp cmd/calico/bin/calico-race-amd64 "${GCS_WORKFLOW_DIR}/calico-race-amd64"
            # Upload the libbpf clone + compiled static lib. `make -C
            # cmd/calico build-cgo` above transitively built it via the Felix
            # CGO dependency chain; the test-or-build below keeps this a
            # no-op on a warm tree but still produces the artifact if the
            # dependency chain is ever severed. Consumers (Felix: Build,
            # Felix: UT) extract this into felix/bpf-gpl/ to skip the clone,
            # avoiding the known github.com/libbpf/libbpf HTTP 500 flake
            # and saving the ~30s build step across all Felix jobs.
            - test -f felix/bpf-gpl/libbpf/src/amd64/libbpf.a || make -C felix libbpf
            - LIBBPF_VERSION=$(grep -E '^LIBBPF_VERSION[[:space:]]*=' metadata.mk | cut -d'=' -f2 | tr -d '[:space:]')
            # Fail loudly if either path is missing. Without this guard, tar would
            # warn and still exit 0 on a missing path, and every downstream Felix
            # job would silently regress to cold libbpf builds.
            - test -d felix/bpf-gpl/libbpf || (echo "ERROR libbpf clone missing at felix/bpf-gpl/libbpf" >&2; exit 1)
            - test -f "felix/bpf-gpl/.libbpf-${LIBBPF_VERSION}" || (echo "ERROR libbpf version marker felix/bpf-gpl/.libbpf-${LIBBPF_VERSION} missing" >&2; exit 1)
            - tar --use-compress-program="zstd -3" -cf /tmp/libbpf-amd64.tar.zst -C felix/bpf-gpl libbpf ".libbpf-${LIBBPF_VERSION}"
            - gcloud storage cp /tmp/libbpf-amd64.tar.zst "${GCS_WORKFLOW_DIR}/libbpf-amd64.tar.zst"
  - name: "Build: node image"
    # Builds the node image on top of the combined calico binary. calico/node is
    # still the canonical DaemonSet image for OSS users, so it continues to ship
    # alongside the unified calico image. The underlying Go state lives in the
    # "calico" build cache populated by "Build: calico image" — only the Docker
    # stage assembly (copying binaries onto the base image) runs here, not the Go
    # compile. Kept in prerequisites (rather than 20-node.yml) so consumer blocks
    # can depend on the shared producer→GCS→consumer upload pattern.
    run:
      when: >-
        change_in(['/.semaphore/semaphore.yml.d/01-preamble.yml',
        '/.semaphore/semaphore.yml.d/02-global_job_config.yml',
        '/.semaphore/semaphore.yml.d/03-promotions.yml',
        '/.semaphore/semaphore.yml.d/09-blocks.yml',
        '/.semaphore/semaphore.yml.d/99-after_pipeline.yml',
        '/.semaphore/semaphore.yml.d/blocks/10-prerequisites.yml',
        '/Makefile',
        '/api/pkg/apis/projectcalico/v3/*.go',
        '/api/pkg/defaults/*.go',
        '/api/pkg/lib/numorstring/*.go',
        '/app-policy/checker/*.go',
        '/app-policy/policystore/*.go',
        '/app-policy/types/*.go',
        '/cni-plugin/internal/pkg/azure/*.go',
        '/cni-plugin/internal/pkg/utils/*.go',
        '/cni-plugin/internal/pkg/utils/cri/*.go',
        '/cni-plugin/pkg/dataplane/*.go',
        '/cni-plugin/pkg/dataplane/grpc/*.go',
        '/cni-plugin/pkg/dataplane/grpc/proto/*.go',
        '/cni-plugin/pkg/dataplane/linux/*.go',
        '/cni-plugin/pkg/ipamplugin/*.go',
        '/cni-plugin/pkg/k8s/*.go',
        '/cni-plugin/pkg/plugin/*.go',
        '/cni-plugin/pkg/types/*.go',
        '/cni-plugin/pkg/upgrade/*.go',
        '/cni-plugin/pkg/wait/*.go',
        '/confd/etc',
        '/confd/pkg/backends/*.go',
        '/confd/pkg/backends/calico/*.go',
        '/confd/pkg/backends/types/*.go',
        '/confd/pkg/config/*.go',
        '/confd/pkg/log/*.go',
        '/confd/pkg/resource/template/*.go',
        '/confd/pkg/run/*.go',
        '/crypto/pkg/tls/*.go',
        '/felix/aws/*.go',
        '/felix/bpf-apache',
        '/felix/bpf-gpl',
        '/felix/bpf/*.go',
        '/felix/bpf/allowsources/*.go',
        '/felix/bpf/arp/*.go',
        '/felix/bpf/asm/*.go',
        '/felix/bpf/bpfdefs/*.go',
        '/felix/bpf/bpfmap/*.go',
        '/felix/bpf/conntrack/*.go',
        '/felix/bpf/conntrack/cleanupv1/*.go',
        '/felix/bpf/conntrack/timeouts/*.go',
        '/felix/bpf/conntrack/v2/*.go',
        '/felix/bpf/conntrack/v3/*.go',
        '/felix/bpf/conntrack/v4/*.go',
        '/felix/bpf/consistenthash/*.go',
        '/felix/bpf/counters/*.go',
        '/felix/bpf/events/*.go',
        '/felix/bpf/failsafes/*.go',
        '/felix/bpf/filter/*.go',
        '/felix/bpf/hook/*.go',
        '/felix/bpf/ifstate/*.go',
        '/felix/bpf/ipfrags/*.go',
        '/felix/bpf/ipsets/*.go',
        '/felix/bpf/jump/*.go',
        '/felix/bpf/legacy/*.go',
        '/felix/bpf/libbpf/*.go',
        '/felix/bpf/maps/*.go',
        '/felix/bpf/nat/*.go',
        '/felix/bpf/polprog/*.go',
        '/felix/bpf/profiling/*.go',
        '/felix/bpf/proxy/*.go',
        '/felix/bpf/qos/*.go',
