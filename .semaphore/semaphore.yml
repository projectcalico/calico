      prologue:
        commands:
          # We need to prune the pre-loaded images to ensure we have enough /var/lib/docker disk space.
          - docker system prune -af
          - .semaphore/load-cached-images
      jobs:
        - name: "E2E tests: Conformance (cluster routing: BIRD)"
          commands:
            - .semaphore/run-and-monitor e2e-test.log make e2e-test
        - name: "E2E tests: Conformance (cluster routing: Felix)"
          commands:
            - .semaphore/run-and-monitor e2e-test-felix-routing.log make e2e-test
          env_vars:
            - name: EXTRA_VALUES_FILES
              value: "hack/test/kind/infra/values-felix-routing.yaml"
            - name: KIND_CALICO_API_GROUP
              value: "crd.projectcalico.org/v1"
            - name: E2E_TEST_CONFIG
              value: "e2e/config/kind-felix-routing.yaml"
        - name: "E2E tests: ClusterNetworkPolicy (cluster routing: Felix)"
          commands:
            - .semaphore/run-and-monitor e2e-test-cnp.log make e2e-test-clusternetworkpolicy
          env_vars:
            - name: EXTRA_VALUES_FILES
              value: "hack/test/kind/infra/values-felix-routing.yaml"
            - name: KIND_CALICO_API_GROUP
              value: "projectcalico.org/v3"
            - name: E2E_TEST_CONFIG
              value: "e2e/config/kind-felix-routing.yaml"
      epilogue:
        always:
          commands:
            - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
