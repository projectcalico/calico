        '/.semaphore/semaphore.yml.d/09-blocks.yml',
        '/.semaphore/semaphore.yml.d/99-after_pipeline.yml',
        '/.semaphore/semaphore.yml.d/blocks/90-release.yml',
        '/hack/test/certs/',
        '/lib.Makefile',
        '/libcalico-go/lib/logutils/*.go',
        '/metadata.mk',
        '/release/**'],
        {pipeline_file: 'ignore', exclude: ['/**/*.md',
        '/**/.gitignore',
        '/**/AUTHORS*',
        '/**/CONTRIBUTING*',
        '/**/DEVELOPER_GUIDE*',
        '/**/LICENSE*',
        '/**/README*',
        '/**/SECURITY.md',
        '/libcalico-go/**/*_test.go']})
    execution_time_limit:
      minutes: 30
    dependencies:
      - Prerequisites
    task:
      prologue:
        commands:
          - cd release
      jobs:
        - name: "Release tooling: CI"
          commands:
            - ../.semaphore/run-and-monitor release-ci.log make ci
            - 'test-results publish --name "Release tool: UT" ./report/*.xml || true'
        - name: "Release tooling: build"
          commands:
            - ../.semaphore/run-and-monitor release-build.log make build
            - cache store release-${SEMAPHORE_GIT_SHA} bin
after_pipeline:
  task:
    jobs:
      - name: Reports
        commands:
          - test-results gen-pipeline-report --force
