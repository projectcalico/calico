        '/**/CONTRIBUTING*',
        '/**/DEVELOPER_GUIDE*',
        '/**/LICENSE*',
        '/**/README*',
        '/**/SECURITY.md']})
    dependencies:
      - Istio
    task:
      agent:
        machine:
          type: s1-aws-arm64-2
      prologue:
        commands:
          - cd istio
      jobs:
        - name: "Linux arm64"
          commands:
            - ../.semaphore/run-and-monitor build-arm64.log make build-ztunnel ARCH=arm64
