    dependencies: []
    task:
      agent:
        machine:
          type: f1-standard-4
          os_image: ubuntu2204
      prologue:
        commands:
          - mkdir logs
          - export BUILD_LOG="logs/build-nft-rpms-${ARCH}.log"
      epilogue:
        always:
          commands:
            - artifact push job logs --destination semaphore/logs || true
      jobs:
        - name: "Build/cache nftables RPMs"
          matrix:
            - env_var: ARCH
              values:
                - amd64
                - arm64
                - ppc64le
                - s390x
          commands:
            - .semaphore/scripts/build-nft-rpms.sh "${ARCH}"
  - name: "Pull: go-build image"
    # Populate the GCS cache of calico/go-build so it can serve as a fallback when
    # a Docker Hub pull fails (which we still see occasionally even with an
    # authenticated session). Jobs pull from Docker Hub first and only fall back to
    # this GCS copy on failure (see the global prologue), so this is just an
    # insurance upload — uploads are free and the common case is a no-op
    # `gcloud storage ls` cache hit, keyed by GO_BUILD_VER so the tarball survives
    # across workflows.
    run:
      when: "true"
    dependencies: []
    task:
      env_vars:
        - name: SKIP_CACHE_RESTORE
          value: "true"
      jobs:
        - name: "Cache calico/go-build to GCS"
          commands:
            - GO_BUILD_VER=$(make --no-print-directory -f metadata.mk -f - <<<'print:; @echo $(GO_BUILD_VER)' print)
            - cache_path="gs://${GCS_BUILD_CACHE_BUCKET}/images/calico-go-build-${GO_BUILD_VER}.tar.zst"
            - |-
              if gcloud storage ls "$cache_path" >/dev/null 2>&1; then
                echo "Cache hit for calico/go-build:${GO_BUILD_VER}"
              else
                echo "Cache miss for calico/go-build:${GO_BUILD_VER}, pulling and uploading"
                docker pull "calico/go-build:${GO_BUILD_VER}"
                docker save "calico/go-build:${GO_BUILD_VER}" -o /tmp/go-build.tar
                zstd -3 --rm /tmp/go-build.tar
                gcloud storage cp /tmp/go-build.tar.zst "$cache_path"
              fi
  - name: "Build: calico image"
    # Build and cache the calico image so that downstream CI blocks can load it
    # from GCS instead of rebuilding per component. This block is the sole
    # producer for the "calico" build-cache group — every Go component block on
    # master restores the module + build cache populated here.
    #
    # This producer must run whenever any of its consumers run: the Felix
    # Build/UT/FV and Windows FV blocks (and others) trigger and then do an
    # untolerated gcloud cp of calico-cgo/calico-race/libbpf (or load the cached
    # calico image), so a skipped producer leaves the artifacts unuploaded and the
    # consumer hard-fails (Semaphore treats a skipped dependency as passed). The
    # CHANGE_IN_WITH_DEPENDENTS() macro guarantees the superset automatically: it
    # merges the arg below (this block's intrinsic inputs — the combined `calico`
    # binary's full Go closure via cmd/calico, plus its Dockerfile) with the
    # resolved trigger of every block that lists this one in its `dependencies:`.
    # So a felix-test-only PR (which fires the Felix blocks) now also runs this
    # producer, with no hand-maintained superset to keep in sync — just keep the
    # consumers' `dependencies:` correct.
    run:
      when: >-
        change_in(['/.semaphore/semaphore.yml.d/01-preamble.yml',
        '/.semaphore/semaphore.yml.d/02-global_job_config.yml',
        '/.semaphore/semaphore.yml.d/03-promotions.yml',
