            minutes: 15
          commands:
            - ../.semaphore/run-and-monitor static-checks.log make static-checks
      epilogue:
        always:
          commands:
            - ./.semaphore/analyze-test-failures --ut || true
            - 'test-results publish --name "${SEMAPHORE_JOB_NAME}" ./report/*.xml || true'
