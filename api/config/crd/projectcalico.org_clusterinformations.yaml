  names:
    kind: ClusterInformation
    listKind: ClusterInformationList
    plural: clusterinformations
    shortNames:
      - clusterinfo
      - clusterinfos
    singular: clusterinformation
  preserveUnknownFields: false
  scope: Cluster
  versions:
    - additionalPrinterColumns:
        - description: The version of Calico that the cluster is running
          jsonPath: .spec.calicoVersion
          name: Version
          type: string
        - description: Whether the datastore is ready for use
          jsonPath: .spec.datastoreReady
          name: Ready
          type: boolean
        - description: The types associated with the cluster
          jsonPath: .spec.clusterType
          name: Types
          type: string
      name: v3
      schema:
        openAPIV3Schema:
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
