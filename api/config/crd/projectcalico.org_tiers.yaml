apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: tiers.projectcalico.org
spec:
  group: projectcalico.org
  names:
    kind: Tier
    listKind: TierList
    plural: tiers
    singular: tier
  preserveUnknownFields: false
  scope: Cluster
  versions:
    - additionalPrinterColumns:
        - description: Order in which the tier is applied
          jsonPath: .spec.order
          name: Order
          type: integer
        - description: Default action for the tier
          jsonPath: .spec.defaultAction
          name: DefaultAction
          type: string
        - description: Current status of the tier
          jsonPath: .status.conditions[?(@.type=='Ready')].reason
          name: Status
          type: string
      name: v3
      schema:
        openAPIV3Schema:
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              properties:
                defaultAction:
                  allOf:
                    - enum:
                        - Allow
                        - Deny
                        - Log
                        - Pass
                    - enum:
                        - Pass
                        - Deny
                  default: Deny
                  type: string
                order:
                  type: number
              type: object
            status:
              properties:
                conditions:
                  items:
                    properties:
                      lastTransitionTime:
                        format: date-time
                        type: string
                      message:
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
              type: object
          required:
            - metadata
            - spec
          type: object
          x-kubernetes-validations:
            - message: The 'kube-admin' tier must have default action 'Pass'
              reason: FieldValueInvalid
              rule:
                "self.metadata.name == 'kube-admin' ? (has(self.spec.defaultAction)
                && self.spec.defaultAction == 'Pass') : true"
            - message: The 'kube-baseline' tier must have default action 'Pass'
              reason: FieldValueInvalid
              rule:
                "self.metadata.name == 'kube-baseline' ? (has(self.spec.defaultAction)
                && self.spec.defaultAction == 'Pass') : true"
            - message: The 'default' tier must have default action 'Deny'
              reason: FieldValueInvalid
              rule:
                "self.metadata.name == 'default' ? (has(self.spec.defaultAction)
                && self.spec.defaultAction == 'Deny') : true"
      served: true
      storage: true
      subresources:
        status: {}
