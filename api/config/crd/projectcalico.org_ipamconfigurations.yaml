apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: ipamconfigurations.projectcalico.org
spec:
  group: projectcalico.org
  names:
    kind: IPAMConfiguration
    listKind: IPAMConfigurationList
    plural: ipamconfigurations
    shortNames:
      - ipamconfig
      - ipamconfigs
    singular: ipamconfiguration
  preserveUnknownFields: false
  scope: Cluster
  versions:
    - additionalPrinterColumns:
        - description: Whether borrowing IP addresses is allowed
          jsonPath: .spec.strictAffinity
          name: StrictAffinity
          type: boolean
        - description: The max number of blocks that can be affine to each host
          jsonPath: .spec.maxBlocksPerHost
          name: MaxBlocksPerHost
          type: integer
        - description: Whether or not to auto allocate blocks to hosts
          jsonPath: .spec.autoAllocateBlocks
          name: AutoAllocateBlocks
          type: boolean
      name: v3
      schema:
        openAPIV3Schema:
          description:
            IPAMConfiguration contains information about a block for IP address
            assignment.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description:
                IPAMConfigurationSpec contains the specification for an IPAMConfiguration
                resource.
              properties:
                autoAllocateBlocks:
                  default: true
                  description: Whether or not to auto allocate blocks to hosts.
                  type: boolean
                kubeVirtVMAddressPersistence:
                  description: |-
                    KubeVirtVMAddressPersistence controls whether KubeVirt VirtualMachine workloads
                    maintain persistent IP addresses across VM lifecycle events (reboot, migration, pod eviction).
                    When Enabled, Calico automatically ensures that KubeVirt VMs retain their IP addresses
                    when their underlying pods are recreated during VM operations.
                    When Disabled, VMs receive new IP addresses whenever their pods are recreated,
                    and creating a live migration target pod is not supported because the migration
                    target pod requires the same IP as the source pod, which is only possible with
                    address persistence.
                    Defaults to Enabled if not specified.
                  enum:
                    - Enabled
                    - Disabled
                  type: string
                maxBlocksPerHost:
                  default: 0
                  description: |-
                    MaxBlocksPerHost, if non-zero, is the max number of blocks that can be
                    affine to each host.
                  format: int32
                  maximum: 1000000
                  minimum: 0
                  type: integer
                strictAffinity:
                  default: false
                  description:
                    When StrictAffinity is true, borrowing IP addresses is
                    not allowed.
                  type: boolean
              required:
                - autoAllocateBlocks
                - strictAffinity
              type: object
          required:
            - metadata
            - spec
          type: object
      served: true
      storage: true
      subresources: {}
