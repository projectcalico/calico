apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: ipreservations.projectcalico.org
spec:
  group: projectcalico.org
  names:
    kind: IPReservation
    listKind: IPReservationList
    plural: ipreservations
    singular: ipreservation
  preserveUnknownFields: false
  scope: Cluster
  versions:
    - name: v3
      schema:
        openAPIV3Schema:
          description: |-
            IPReservation allows certain IP addresses to be reserved (i.e. prevented from being allocated) by Calico
            IPAM.  Reservations only block new allocations, they do not cause existing IP allocations to be released.
            The current implementation is only suitable for reserving small numbers of IP addresses relative to the
            size of the IP pool.  If large portions of an IP pool are reserved, Calico IPAM may hunt for a long time
            to find a non-reserved IP.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description:
                IPReservationSpec contains the specification for an IPReservation
                resource.
              properties:
                reservedCIDRs:
                  description: |-
                    ReservedCIDRs is a list of CIDRs that Calico IPAM will exclude from new allocations.
                    Each entry must be in CIDR notation (e.g., "10.0.0.0/24" or "10.0.0.1/32" for a single IP).
                  format: cidr
                  items:
                    type: string
                  type: array
                  x-kubernetes-list-type: set
              type: object
          required:
            - metadata
            - spec
          type: object
      served: true
      storage: true
