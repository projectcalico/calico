                              anyOf:
                                - type: integer
                                - type: string
                              pattern: ^.*
                              x-kubernetes-int-or-string: true
                            maxItems: 50
                            type: array
                            x-kubernetes-list-type: atomic
                          notSelector:
                            description: |-
