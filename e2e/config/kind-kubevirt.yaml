# kind-kubevirt.yaml - test selection for KubeVirt live migration on KIND.
#
# Used by the "KubeVirt live migration (KIND)" Semaphore block.
# Runs KubeVirt tests that work with MockVirt (simulated KubeVirt) on a KIND
# cluster. Tests requiring real QEMU-backed VMs are excluded via the
# RequiresRealKubeVirt label.

include:
  - Feature:KubeVirt

exclude:
  labels:
    - label: RequiresRealKubeVirt
      reason: "requires real KubeVirt with QEMU VMs; KIND uses MockVirt simulation"
