# Gateway API conformance metallb IPAddressPool.
#
# Calico's default metallb pool (hack/test/kind/infra/metallb-config.yaml)
# uses BGP advertisement with public-IP addresses (80.15.0.0/24). Those IPs
# get programmed as routes inside the cluster via Calico's BGP fan-out, so
# in-cluster pods can reach them, but the Gateway API conformance test
# binary runs from the host (Semaphore VM or developer laptop) where there
# is no BGP session and the IPs don't resolve.
#
# This file adds a SECOND, namespace-scoped pool in L2 mode whose addresses
# come from the kind docker bridge subnet. Hosts have a direct route to
# that bridge, so LB IPs land on the bridge and are reachable from the
# test runner without any BGP fan-out.
#
# The address range placeholder below is substituted at apply time by
# `make e2e-gateway-setup`, which queries `docker network inspect kind`
# for the kind bridge IPv4 subnet and picks .200-.250 of the same prefix
# (matches what envoyproxy/gateway's tools/hack/create-cluster.sh does).
#
# serviceAllocation.priority is higher than the default BGP pool so the
# conformance Services pin here deterministically; namespaces are the
# three the upstream conformance suite's base manifests create
# (gateway-conformance-{infra,app-backend,web-backend}) plus
# tigera-gateway in case the operator places EG-managed LB Services in
# the controller's namespace rather than the Gateway's.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: gateway-conformance
  namespace: metallb-system
spec:
  addresses:
    - "__LB_RANGE_V4__"
  serviceAllocation:
    priority: 100
    namespaces:
      - gateway-conformance-infra
      - gateway-conformance-app-backend
      - gateway-conformance-web-backend
      - tigera-gateway
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: gateway-conformance
  namespace: metallb-system
spec:
  ipAddressPools:
    - gateway-conformance
