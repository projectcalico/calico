{{- $count := conv.ToInt .Env.LINUX_NODE_COUNT -}}
{{- range $i := seq 0 (sub $count 1) -}}
{{- $nodeNum := add $i 1 -}}
{{- $nodeName := printf "vm-linux-%d" $nodeNum -}}
{{- $nicName := printf "nic-linux-%d" $nodeNum -}}
{{- $pipName := printf "pip-linux-%d" $nodeNum -}}
{{- $extContainerdName := printf "vm-linux-%d-containerd" $nodeNum -}}
{{- $computerName := printf "asovm-linux-%d" $nodeNum -}}{{/* NOTE: asovm-linux-%d here would have the l2bridge cni-plugin hang, maybe there's a problem with the name being too short? */}}
---
apiVersion: compute.azure.com/v1api20220301
kind: VirtualMachine
metadata:
  name: {{$nodeName}}
  namespace: aso
spec:
  location: {{$.Env.AZURE_LOCATION}}
  owner:
    name: {{$.Env.AZURE_RESOURCE_GROUP}}
  hardwareProfile:
    vmSize: Standard_D4s_v3
  networkProfile:
    networkInterfaces:
      - reference:
          group: network.azure.com
          kind: NetworkInterface
          name: {{$nicName}}
  osProfile:
    computerName: {{$computerName}}
    adminUsername: aso
    adminPassword:
      key: password
      name: aso-secret-windows
    linuxConfiguration:
      disablePasswordAuthentication: true
      ssh:
        publicKeys:
          - keyData: {{$.Env.PUBLIC_KEY}}
            path: /home/aso/.ssh/authorized_keys
  storageProfile:
    imageReference:
      publisher: Canonical
      offer: 0001-com-ubuntu-server-jammy
      sku: 22_04-lts
      version: latest
    osDisk:
      createOption: FromImage
      managedDisk:
        storageAccountType: Premium_LRS
---
apiVersion: compute.azure.com/v1api20220301
kind: VirtualMachinesExtension
metadata:
  name: {{$extContainerdName}}
  namespace: aso
spec:
  location: {{$.Env.AZURE_LOCATION}}
  owner:
    name: {{$nodeName}}
  publisher: Microsoft.Azure.Extensions
  type: CustomScript
  typeHandlerVersion: "2.1"
  autoUpgradeMinorVersion: true
  settings:
    commandToExecute: |
      /bin/bash -c '
      set -eu -o pipefail
      echo "Installing containerd..."

      # Wait for cloud-init to fully finish before touching apt — on first
      # boot, cloud-init / unattended-upgrades hold /var/lib/dpkg/lock-frontend
      # and trip an apt lock-timeout that aborts the rest of this script.
      cloud-init status --wait || true

      # Stop and mask the apt timers and unattended-upgrades so they cannot
      # re-acquire the dpkg lock mid-install. Lenient: missing units on
      # leaner images must not abort set -e.
      systemctl stop apt-daily.service apt-daily-upgrade.service unattended-upgrades.service 2>/dev/null || true
      systemctl mask apt-daily.timer apt-daily-upgrade.timer unattended-upgrades.service 2>/dev/null || true

      # Retry apt phases. Azure CustomScript extensions do not auto-retry,
      # and set -e makes a single transient apt/network failure terminal.
      apt_retry() {
        local n=3 i
        for i in $(seq 1 $n); do
          if "$@"; then return 0; fi
          echo "Command failed (attempt $i/$n): $* - retrying in 20s..."
          sleep 20
        done
        echo "Command failed after $n attempts: $*"
        return 1
      }

      # Update package list
      apt_retry apt-get -o DPkg::Lock::Timeout=180 update

      # Install prerequisites
      apt_retry apt-get -o DPkg::Lock::Timeout=180 install -y apt-transport-https ca-certificates curl gnupg lsb-release

      # Install containerd from the Docker repo
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --batch --yes --no-tty --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      apt_retry apt-get -o DPkg::Lock::Timeout=180 update
      apt_retry apt-get -o DPkg::Lock::Timeout=180 install -y containerd.io

      # Configure containerd for Kubernetes
      mkdir -p /etc/containerd
      containerd config default | tee /etc/containerd/config.toml

      # Enable systemd cgroup driver (required for Kubernetes)
      sed -i "s/SystemdCgroup = false/SystemdCgroup = true/g" /etc/containerd/config.toml

      # Restart containerd
      systemctl restart containerd
      systemctl enable containerd

      # Verify installations
      containerd --version

      echo "Containerd installation completed successfully"
      '
---
apiVersion: network.azure.com/v1api20240301
kind: NetworkInterface
metadata:
  name: {{$nicName}}
  namespace: aso
spec:
  location: {{$.Env.AZURE_LOCATION}}
  owner:
    name: {{$.Env.AZURE_RESOURCE_GROUP}}
  networkSecurityGroup:
    reference:
      group: network.azure.com
      kind: NetworkSecurityGroup
      name: aso-sg
  ipConfigurations:
    - name: ipconfig-linux-{{$nodeNum}}
      subnet:
        reference:
          group: network.azure.com
          kind: VirtualNetworksSubnet
          name: subnet-aso
      publicIPAddress:
        reference:
          group: network.azure.com
          kind: PublicIPAddress
          name: {{$pipName}}
---
apiVersion: network.azure.com/v1api20240301
kind: PublicIPAddress
metadata:
  name: {{$pipName}}
  namespace: aso
spec:
  location: {{$.Env.AZURE_LOCATION}}
  owner:
    name: {{$.Env.AZURE_RESOURCE_GROUP}}
  publicIPAllocationMethod: Static
  sku:
    name: Standard
{{end}}
