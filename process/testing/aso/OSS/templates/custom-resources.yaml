# This section includes base Calico installation configuration.
# For more information, see: https://docs.tigera.io/calico/latest/reference/installation/api#operator.tigera.io/v1.Installation
apiVersion: operator.tigera.io/v1
kind: Installation
metadata:
  name: default
spec:
  variant: Calico
  # win-fv local-build imports component images onto the nodes; IfNotPresent
  # keeps kubelet from trying to pull them. Benign for the hashrelease path.
  imagePullPolicy: IfNotPresent
  cni:
    type: Calico
    # Skip the cni-plugins init container; the Windows FV doesn't need the
    # upstream plugins and this avoids building/importing their image.
    installMode: CalicoOnly
  calicoNetwork:
    bgp: Disabled
    linuxDataplane: {{$.Env.ASO_LINUX_DATAPLANE}}
    ipPools:
      - cidr: 192.168.0.0/16
        encapsulation: VXLAN
    windowsDataplane: HNS
  serviceCIDRs:
    - 10.96.0.0/12
  windowsNodes:
    cniBinDir: "/Program Files/containerd/cni/bin"
    cniConfigDir: "/Program Files/containerd/cni/conf"
    cniLogDir: /var/log/calico/cni
---
# This section configures the Calico API server.
# For more information, see: https://docs.tigera.io/calico/latest/reference/installation/api#operator.tigera.io/v1.APIServer
apiVersion: operator.tigera.io/v1
kind: APIServer
metadata:
  name: default
spec: {}
