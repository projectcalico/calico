[tox]
minversion = 2.0
envlist =
   py38
   black
   flake8
skipsdist = True

[testenv]
usedevelop = True
passenv =
   HOME
   PIP_CONSTRAINT
setenv =
   VIRTUAL_ENV={envdir}
   PYTHONWARNINGS=default::DeprecationWarning,ignore::DeprecationWarning:distutils,ignore::DeprecationWarning:site,ignore:Using or importing the ABCs,ignore:dns.hash module,ignore:Please provide `is_available
deps = -r{toxinidir}/test-requirements.txt
commands =
    coverage erase
    python setup.py testr --slowest --testr-args='{posargs}'
    coverage report -m

[testenv:venv]
commands = {posargs}

[testenv:fv]
# Functional-verification tests.  These spawn a real etcd subprocess and
# need eventlet's cooperative I/O, so they opt in to monkey_patch via
# CALICO_RUN_FV_TESTS=1 (see networking_calico/tests/test_fv_etcdutils.py).
# Run them with `tox -e fv` (or via the Makefile wrappers); the standard
# `tox -e py38` run does NOT include them because module-level
# eventlet.monkey_patch in the same Python process as the other unit
# tests interacts badly with subunit's runner and hangs the test run.
setenv =
   {[testenv]setenv}
   CALICO_RUN_FV_TESTS=1
commands =
   python -m unittest -v networking_calico.tests.test_fv_etcdutils

[testenv:cover]
commands = python setup.py test --coverage --coverage-package-name=networking_calico --testr-args='{posargs}'
    coverage report

[testenv:debug]
commands = oslo_debug_helper {posargs}

[testenv:black]
deps = black
commands = black --preview --enable-unstable-feature=string_processing networking_calico setup.py devstack

[testenv:flake8]
deps = flake8
commands = flake8 networking_calico setup.py devstack
