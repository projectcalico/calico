[template]
src = "bird_ipam.cfg.template"
dest = "/etc/calico/confd/config/bird_ipam.cfg"
prefix = "/calico"
keys = [
    "/bgpconfig",
    "/v1/ipam/v4/pool",
    "/v1/ipam/v6/pool",
    "/bgp/v1/host//NODENAME",
    "/staticroutes",
    "/staticroutesv6",
    "/rejectcidrs",
    "/rejectcidrsv6",
]
reload_cmd = "sv hup bird || true"
