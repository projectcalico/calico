                  type: integer
                wireguardRoutingRulePriority:
                  description:
                    "WireguardRoutingRulePriority controls the priority value
                    to use for the Wireguard routing rule. [Default: 99]"
                  type: integer
                wireguardThreadingEnabled:
                  description: |-
