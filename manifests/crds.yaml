                              peerIP:
                                description:
                                  If sourceType is NodeMesh or BGPPeer, IP
                                  address of the router that sent us this route.
                                type: string
                              sourceType:
                                description:
                                  Type of the source where a route is learned
                                  from.
                                enum:
                                  - Kernel
                                  - Static
                                  - Direct
                                  - NodeMesh
                                  - BGPPeer
                                type: string
                            type: object
                          type:
                            description:
                              Type indicates if the route is being used for
                              forwarding or not.
                            enum:
                              - FIB
                              - RIB
                            type: string
                        type: object
                      type: array
                      x-kubernetes-list-type: atomic
                  type: object
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
