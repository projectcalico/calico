                              x-kubernetes-int-or-string: true
                              anyOf:
                                - type: integer
                                - type: string
                              pattern: ^.*
                            maxItems: 50
                            type: array
                            x-kubernetes-list-type: atomic
                          selector:
                            description: "Selector is an optional field that contains a selector expression (see Policy for\nsample syntax).  Only traffic that originates from (terminates at) endpoints matching\nthe selector will be matched.\n\nNote that: in addition to the negated version of the Selector (see NotSelector below), the\nselector expression syntax itself supports negation.  The two types of negation are subtly\ndifferent. One negates the set of matched endpoints, the other negates the whole match:\n\n\tSelector = \"!has(my_label)\" matches packets that are from other Calico-controlled\n\tendpoints that do not have the label \"my_label\".\n\n\tNotSelector = \"has(my_label)\" matches packets that are not from Calico-controlled\n\tendpoints that do have the label \"my_label\".\n\nThe effect is that the latter will accept packets from non-Calico sources whereas the\nformer is limited to packets from Calico-controlled endpoints."
                            maxLength: 1024
                            type: string
                          serviceAccounts:
                            description: |-
                              ServiceAccounts is an optional field that restricts the rule to only apply to traffic that originates from (or
                              terminates at) a pod running as a matching service account.
                            properties:
                              names:
                                description: |-
                                  Names is an optional field that restricts the rule to only apply to traffic that originates from (or terminates
                                  at) a pod running as a service account whose name is in the list.
                                items:
                                  type: string
                                type: array
                                x-kubernetes-list-type: set
                              selector:
                                description: |-
                                  Selector is an optional field that restricts the rule to only apply to traffic that originates from
                                  (or terminates at) a pod running as a service account that matches the given label selector.
                                  If both Names and Selector are specified then they are AND'ed.
                                type: string
                            type: object
                          services:
                            description: |-
                              Services is an optional field that contains options for matching Kubernetes Services.
                              If specified, only traffic that originates from or terminates at endpoints within the selected
                              service(s) will be matched, and only to/from each endpoint's port.

                              Services cannot be specified on the same rule as Selector, NotSelector, NamespaceSelector, Nets,
                              NotNets or ServiceAccounts.

                              Ports and NotPorts can only be specified with Services on ingress rules.
                            properties:
                              name:
                                description: Name specifies the name of a Kubernetes Service to match.
                                maxLength: 253
                                type: string
                              namespace:
                                description: |-
