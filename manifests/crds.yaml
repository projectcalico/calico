                            rule: "!has(self.code) || has(self.type)"
                      ipVersion:
                        description: |-
                          IPVersion is an optional field that restricts the rule to only match a specific IP
                          version.
                        enum:
                          - 4
                          - 6
                        type: integer
                      metadata:
                        description: Metadata contains additional information for this rule
                        properties:
                          annotations:
                            additionalProperties:
                              type: string
                            description: Annotations is a set of key value pairs that give extra information about the rule
                            type: object
                        type: object
                      notICMP:
                        description: NotICMP is the negated version of the ICMP field.
                        properties:
                          code:
                            description: |-
                              Match on a specific ICMP code.  If specified, the Type value must also be specified.
                              This is a technical limitation imposed by the kernel's iptables firewall, which
                              Calico uses to enforce the rule.
                            maximum: 255
                            minimum: 0
                            type: integer
