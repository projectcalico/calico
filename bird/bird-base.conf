# Default base config for the BIRD 3.x peer container used in Calico e2e/k8st
# tests. Single unified daemon serving both IPv4 and IPv6. Router id is
# auto-derived from an interface IPv4 address.
log stderr { error, fatal, info, warning };

protocol device {
  scan time 2;
}

# Install BGP-learned routes into the kernel with ECMP support (IPv4).
protocol kernel {
  ipv4 {
    import none;
    export all;
  };
  merge paths on;
  learn;
  metric 0;
}

# Install BGP-learned routes into the kernel with ECMP support (IPv6).
protocol kernel {
  ipv6 {
    import none;
    export all;
  };
  merge paths on;
  learn;
  metric 0;
}

# Peers and static routes are written by the test harness and reloaded via
# "birdcl configure". Both files are pre-created (possibly empty) in the image.
include "/etc/bird/peers.conf";
include "/etc/bird/static-route.conf";
