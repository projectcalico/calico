        value: Calico
      - name: INSTALLER
        value: operator
      - name: K8S_E2E_FLAGS
        value: --ginkgo.focus=(\[sig-calico\]|\[Conformance\]) --ginkgo.skip=(\[Slow\]|\[Disruptive\])
      - name: K8S_VERSION
        value: stable-1
      - name: PROVISIONER
        value: azr-aks
      - name: USE_VENDORED_CNI
        value: "true"
    commands: |
      .argoci/scripts/body_standard.sh
  - name: dual-stack-k8s-e2e-kdd
    jobSize: large
    services:
      - docker
    env:
      - name: ENABLE_CALICOCTL_APISERVER
        value: "true"
      - name: ENABLE_DUAL_STACK
        value: "true"
      - name: K8S_E2E_EXTRA_FLAGS
        value: --feature-gates=dualstack=true
      - name: K8S_E2E_FLAGS
        value: --ginkgo.focus=(\[sig-calico\]|\[Conformance\]) --ginkgo.skip=(\[Slow\]|\[Disruptive\]|\[DataPath\]|WireGuard)
      - name: K8S_VERSION
        value: stable-1
      - name: KIND_CONFIG
        value: |
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          networking:
            disableDefaultCNI: true
            ipFamily: dual
            podSubnet: "192.168.0.0/16,fd00:10:244::/64"
          nodes:
          # the control plane node
          - role: control-plane
          - role: worker
          - role: worker
          - role: worker
      - name: PROVISIONER
        value: local-kind
    matrix:
      - name: calico-yaml
        env:
          - name: MANIFEST_FILE
            value: calico.yaml
      - name: calico-typha-yaml
        env:
          - name: MANIFEST_FILE
            value: calico-typha.yaml
    commands: |
      .argoci/scripts/body_standard.sh
  - name: dual-stack-k8s-e2e-etcd
    jobSize: large
