    env:
      - name: AZ_VM_SIZE
        value: Standard_D4plds_v5
      - name: INSTALLER
        value: operator
      - name: PROVISIONER
        value: azr-aks
      - name: STERN_CHECK
        value: DISABLED
    matrix:
      - name: stable-1-azure-
        env:
          - name: K8S_VERSION
            value: stable-1
          - name: AZ_NETWORK_PLUGIN
            value: azure
          - name: CLUSTER_MODE
