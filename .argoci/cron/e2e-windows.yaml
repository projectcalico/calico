# Condensed ArgoCI e2e workflow; cc-argoci-handler expands it into a CronWorkflow at runtime.
# Migrated from the Semaphore e2e pipeline of the same name — maintained here by hand.
version: condensed
generateName: e2e-windows-
schedule: 10 23 * * 5
globalPrologue: |
  cd "${CI_HOME}/${CI_GIT_DIR}"
  export ARGO_WORKFLOW_NAME="{{workflow.name}}"
  export ARGO_WORKFLOW_UID="{{workflow.uid}}"
  export CREATE_WINDOWS_NODES="${CREATE_WINDOWS_NODES-true}"
  export FUNCTIONAL_AREA="${FUNCTIONAL_AREA-windows.yml}"
  export K8S_E2E_FLAGS="${K8S_E2E_FLAGS---ginkgo.focus=\[sig-calico\].*\[RunsOnWindows\]}"
  export PRIVATE_REGISTRY="${PRIVATE_REGISTRY-quay.io/}"
  export USE_PRIVATE_REGISTRY="${USE_PRIVATE_REGISTRY-true}"
  source .argoci/scripts/global_prologue.sh
globalEpilogue: |
  source "${CI_HOME}/${CI_GIT_DIR}/.argoci/scripts/global_epilogue.sh"
defaults:
  secretBundles:
    - banzai-secrets
steps:
  - name: calico-windows-aws-kubeadm-1809-stable-3-iptables-none
    services:
      - docker
      - http-cache-proxy
    env:
      - name: DATAPLANE
        value: CalicoIptables
      - name: ENCAPSULATION_TYPE
        value: None
      - name: K8S_VERSION
        value: stable-3
      - name: PROVISIONER
        value: aws-kubeadm
      - name: VPC_SUBNETS
        value: '["172.16.101.0/24"]'
      - name: WINDOWS_OS_VERSION
        value: "1809"
    commands: |
      .argoci/scripts/body_standard.sh
  - name: calico-windows-gcp-kubeadm-2022-stable-bpf-vxlan
    services:
      - docker
      - http-cache-proxy
    env:
      - name: DATAPLANE
        value: CalicoBPF
      - name: ENCAPSULATION_TYPE
        value: VXLAN
      - name: K8S_VERSION
        value: stable
      - name: PROVISIONER
        value: gcp-kubeadm
      - name: WINDOWS_OS_VERSION
        value: "2022"
    commands: |
      .argoci/scripts/body_standard.sh
  - name: calico-windows-gcp-rancher-2022-stable-1-nftables-vxlan
    services:
      - docker
      - http-cache-proxy
    env:
      - name: DATAPLANE
        value: CalicoNftables
      - name: ENCAPSULATION_TYPE
        value: VXLAN
      - name: K8S_VERSION
        value: v1.32.7
      - name: PROVISIONER
        value: gcp-rancher
      - name: RKE_VERSION
        value: v1.8.6
      - name: WINDOWS_OS_VERSION
        value: "2022"
    commands: |
      .argoci/scripts/body_standard.sh
