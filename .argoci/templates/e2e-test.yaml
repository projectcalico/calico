# e2e-test - the shared WorkflowTemplate every generated e2e CronWorkflow
# references via templateRef. It carries no branch-specific logic: it sources
# the checked-out branch's .argoci/scripts, so a single cluster-applied copy
# serves master and all release branches. See .argoci/DESIGN.md.
#
# The container image, envFrom secrets and nodeSelector/tolerations come from
# the referencing workflow's templateDefaults; this template only defines the
# per-job contract: the test-vars blob, resource requests, and the
# prologue -> body_standard -> epilogue lifecycle with a dind sidecar.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: e2e-test
  namespace: argoci
spec:
  templates:
    - name: e2e-test
      inputs:
        parameters:
          - name: test-vars
          - name: cpu-requests
            value: "1000m"
          - name: mem-requests
            value: "2Gi"
      podSpecPatch: |
        containers:
          - name: main
            resources:
              requests:
                cpu: "{{inputs.parameters.cpu-requests}}"
                memory: "{{inputs.parameters.mem-requests}}"
            envFrom:
              - secretRef:
                  name: banzai-secrets
                  optional: true
              - secretRef:
                  name: marvin-github-ssh-private-key
                  optional: true
      script:
        # Self-contained: templateDefaults does not cross templateRef, so the
        # shared template pins its own image/command/workingDir.
        image: gcr.io/tigera-cc-dev/ci-base/ubuntu-cloud-providers:v0.104
        imagePullPolicy: Always
        command: [bash]
        workingDir: /src
        env:
          - name: TEST_SETTINGS
            value: '{{inputs.parameters.test-vars}}'
          - name: BRANCH
            value: "{{workflow.parameters.branch}}"
          - name: DOCKER_HOST
            value: tcp://127.0.0.1:2375
        source: |
          source checkout
          printf '%s\n' "$TEST_SETTINGS" > /tmp/test-vars
          source /tmp/test-vars
          export CI_EXIT_CODE=0
          source ${CI_HOME}/${CI_GIT_DIR}/.argoci/scripts/global_prologue.sh
          cd ${CI_HOME}/${CI_GIT_DIR}
          .argoci/scripts/body_standard.sh || CI_EXIT_CODE=1
          source ${CI_HOME}/${CI_GIT_DIR}/.argoci/scripts/global_epilogue.sh
          exit ${CI_EXIT_CODE}
        volumeMounts:
          - { name: dockershare, mountPath: /dockershare }
          - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: dockershare, emptyDir: {} }
        - { name: tmp, emptyDir: {} }
      sidecars:
        - name: dind
          image: docker:27-dind
          command: [dockerd-entrypoint.sh]
          env:
            - { name: DOCKER_TLS_CERTDIR, value: "" }
          securityContext:
            privileged: true
          mirrorVolumeMounts: true
