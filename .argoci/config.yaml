# ArgoCI per-repo configuration for projectcalico/calico.
# Mirrors tigera/banzai-service/.argoci/config.yaml. The CI workflow named by
# ciFile is submitted on matching changes; scheduled e2e suites live in
# .argoci/cron/*.yaml. See .argoci/DESIGN.md.
ciFile: ciworkflow.yaml
changes:
  in:
    - \.argoci/.*
    - e2e/config/.*
  exclude:
    - .*/README\.md
    - \.argoci/DESIGN\.md
runOnTag: false
