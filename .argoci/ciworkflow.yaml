version: condensed
generateName: calico-
globalPrologue: |
    export GOOGLE_APPLICATION_CREDENTIALS=$HOME/secrets/secret.google-service-account-key.json
    gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS" || true
    gcloud config set project ${GOOGLE_PROJECT} || true
    echo $DOCKERHUB_PASSWORD | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
defaults:
    jobSize: small
    image: gcr.io/tigera-cc-dev/ci-base/calico-ci:v0.1
    secretBundles:
        - name: docker-hub
          loadAll: true
        - name: google-service-account-for-gce
          loadAll: true
steps:
    - name: check-images-availability
      env:
        - name: GOOGLE_PROJECT
          value: unique-caldron-775
        - name: BUILDKIT_PROGRESS
          value: plain
      # changes:
      #   in:
      #       - ^charts/
      #       - ^manifests/
      commands: |
        make check-images-availability

    - name: check-semaphore-files
      env:
        - name: GOOGLE_PROJECT
          value: unique-caldron-775
        - name: BUILDKIT_PROGRESS
          value: plain
      # changes:
      #   in:
      #       - ^\.semaphore$
      #       - ^hack$
      #       - ^Makefile$
      #       - ^lib\.Makefile$
      #       - ^metadata\.mk$
      commands: |
        make gen-semaphore-yaml
        make check-dirty

    - name: check-yaml-files
      env:
        - name: GOOGLE_PROJECT
          value: unique-caldron-775
        - name: BUILDKIT_PROGRESS
          value: plain
      # changes:
      #   in:
      #       - ^.*[^/]*\.yml
      #       - ^.*[^/]*\.yaml
      #       - ^Makefile$
      #       - ^lib\.Makefile$
      #       - ^metadata\.mk$
      commands: |
        make yaml-lint

    - name: check-go-files
      env:
        - name: GOOGLE_PROJECT
          value: unique-caldron-775
        - name: BUILDKIT_PROGRESS
          value: plain
      # changes:
      #   in:
      #       - ^go\.mod$
      #       - ^go\.sum$
      #       - ^.*[^/]*\.go
      #       - ^.*deps\.txt
      #       - ^Makefile$
      #       - ^lib\.Makefile$
      #       - ^metadata\.mk$
      commands: |
        make check-ginkgo-v2
        make check-go-mod
        make verify-go-mods
        make gen-deps-files
        make go-vet
        if [ -n "$CI_GIT_PR_NUMBER" ]; then
          make fix-changed
        else
          make fix-all
        fi
        make check-dirty

