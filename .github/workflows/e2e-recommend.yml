name: E2E Recommendations

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Marker used to find and update the recommendation comment.
  COMMENT_MARKER: "<!-- e2e-recommend -->"

jobs:
  recommend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed files
        run: |
          gh pr diff ${{ github.event.pull_request.number }} --name-only > /tmp/changed-files.txt
          echo "Changed files:"
          cat /tmp/changed-files.txt

      - name: Generate recommendations
        run: |
          python3 - <<'PYEOF'
          import yaml
          from fnmatch import fnmatch
          from collections import defaultdict

          with open(".github/e2e-path-labels.yaml") as f:
              path_labels_config = yaml.safe_load(f)

          with open(".github/e2e-profiles.yaml") as f:
              profiles_config = yaml.safe_load(f)

          with open("/tmp/changed-files.txt") as f:
              changed_files = [line.strip() for line in f if line.strip()]

          recommendations = defaultdict(lambda: {"reason": "", "matched_files": []})

          for rule in path_labels_config.get("path_labels", []):
              patterns = rule.get("paths", [])
              profiles = rule.get("profiles", [])
              label = rule.get("labels", "")
              reason = rule.get("reason", "")

              matched = [f for f in changed_files if any(fnmatch(f, p) for p in patterns)]
              if not matched:
                  continue

              for profile in profiles:
                  key = (profile, label)
                  rec = recommendations[key]
                  rec["reason"] = reason
                  for mf in matched:
                      if mf not in rec["matched_files"]:
                          rec["matched_files"].append(mf)

          lines = []
          if recommendations:
              lines.append("Based on the changes in this PR, here are some recommended commands:\n")
              for (profile, label), info in sorted(recommendations.items()):
                  reason = info["reason"]
                  matched_files = info["matched_files"]

                  if label:
                      cmd = f'/e2e {profile} --label-filter="{label}"'
                  else:
                      cmd = f'/e2e {profile}'

                  shown = matched_files[:3]
                  remainder = len(matched_files) - len(shown)
                  file_list = ", ".join(f"`{f}`" for f in shown)
                  if remainder > 0:
                      file_list += f" and {remainder} more"

                  lines.append(f"- `{cmd}` - {reason} ({file_list})")
              lines.append("\nCopy a command and paste it as a PR comment to trigger.")
          else:
              lines.append("No specific tests were identified for the changes in this PR. "
                           "Consider running `/e2e iptables-gcp` for general coverage.")

          body = "\n".join(lines)
          with open("/tmp/recommendation-body.md", "w") as f:
              f.write(body)
          PYEOF

      - name: Find existing recommendation comment
        id: find-comment
        run: |
          comment_id=$(gh api \
            "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq "[.[] | select(.body | contains(\"$COMMENT_MARKER\"))] | first | .id // empty")
          echo "comment_id=${comment_id}" >> "$GITHUB_OUTPUT"

      - name: Post or update recommendation comment
        run: |
          HEADER="${COMMENT_MARKER}
          **E2E Testing**

          Project maintainers can use the \`/e2e\` command to run e2e tests against this PR. Do this when you are confident the PR is ready to go.

          "

          BODY=$(cat /tmp/recommendation-body.md)
          FULL="${HEADER}${BODY}"

          # Write to file and use python to JSON-encode for the API.
          echo "$FULL" > /tmp/full-comment.md
          COMMENT_ID="${{ steps.find-comment.outputs.comment_id }}"

          if [ -n "${COMMENT_ID}" ]; then
            gh api \
              --method PATCH \
              "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              --input - <<EOF
          {"body": $(python3 -c "import json; print(json.dumps(open('/tmp/full-comment.md').read()))")}
          EOF
          else
            gh api \
              --method POST \
              "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              --input - <<EOF
          {"body": $(python3 -c "import json; print(json.dumps(open('/tmp/full-comment.md').read()))")}
          EOF
          fi
