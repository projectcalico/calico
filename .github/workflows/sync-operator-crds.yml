# Keep generated and pinned-upstream content in sync. Pulls operator CRDs from
# tigera/operator, regenerates all generated files (make generate), and bumps
# the bundled CNI plugin pin to the latest upstream commit. Opens or updates a
# single PR per branch carrying whatever drifted.
#
# Runs every 4h, but a cheap drift check up front skips the heavy regen unless
# something actually changed: a recent merge, an operator CRD update, or the CNI
# pin falling behind upstream.
---
name: Sync upstream
on:  # yamllint disable-line rule:truthy
  schedule:
    - cron: '0 */4 * * *'  # every 4 hours
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  discover-branches:
    if: github.repository == 'projectcalico/calico'
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.branches.outputs.branches }}
    steps:
      - name: Discover branches
        id: branches
        run: |
          # Get master + the two most recent release branches (by semver).
          # Pipe to jq separately so --slurp combines all pages before filtering.
          # Using --jq with --paginate applies the filter per-page, which can
          # produce multiple JSON arrays and break $GITHUB_OUTPUT.
          branches=$(gh api repos/${{ github.repository }}/branches --paginate | jq -sc '
            [flatten[] | select(.name | test("^release-v[0-9]+\\.[0-9]+$")) | .name]
            | sort_by(ltrimstr("release-v") | split(".") | map(tonumber))
            | .[-2:]
            | ["master"] + .
          ')
          echo "branches=${branches}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

  sync:
    needs: discover-branches
    runs-on: ubuntu-latest
    concurrency:
      group: sync-upstream-${{ matrix.branch }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJson(needs.discover-branches.outputs.branches) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ matrix.branch }}
          # Full history so generators that use git describe / changed-file
          # detection behave the same as a local checkout, and so the drift
          # check below can see recent commit timestamps.
          fetch-depth: 0

      - name: Check for drift
        id: drift
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          recent=false; operator=false; cni=false; cni_sha=

          force=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            force=true  # manual runs do the full work (handy for testing / forcing a sync)
          fi

          # recent: a merge could have changed generated output. The window must
          # stay larger than the cron interval (4h) so we never skip across a gap
          # between runs. Coarse on purpose -- we can't know what a merge touched,
          # so any merge means regenerate.
          if [ "$force" = true ] || [ -n "$(git log -1 --since='5 hours ago' --format=%H)" ]; then
            recent=true
          fi

          # operator: reuse the same fetch the generate target uses, minus the
          # Docker-based formatting (SKIP_FIX_CHANGED), then see if anything
          # changed. Revert the probe's writes; the real run redoes them.
          make get-operator-crds SKIP_FIX_CHANGED=true
          if [ "$force" = true ] || ! git diff --quiet; then
            operator=true
          fi
          git checkout -- .

          # cni: pin behind upstream. Capture the target SHA here so the bump
          # step doesn't have to query again (and can't race a moving upstream).
          repo=projectcalico/containernetworking-plugins
          db=$(gh api "repos/$repo" -q .default_branch)
          cni_sha=$(gh api "repos/$repo/commits/$db" -q .sha)
          cur=$(grep '^CNI_VERSION=' metadata.mk | cut -d= -f2)
          if [ "$force" = true ] || [ "$cni_sha" != "$cur" ]; then
            cni=true
          fi

          echo "drift: recent=$recent operator=$operator cni=$cni"
          {
            echo "recent=$recent"
            echo "operator=$operator"
            echo "cni=$cni"
            echo "cni_sha=$cni_sha"
          } >> "$GITHUB_OUTPUT"

      # make generate is the heavy step, so it only runs when something it
      # actually regenerates drifted. A CNI-only bump skips it entirely.
      - name: Install tools
        if: steps.drift.outputs.recent == 'true' || steps.drift.outputs.operator == 'true'
        run: make bin/helm bin/yq

      - name: Bump CNI plugin pin
        # Only CNI_VERSION; FLANNEL_VERSION is a release tag with the Go toolchain
        # baked into the name, so we don't auto-bump it. CNI_VERSION is a build-time
        # clone ref, not baked into any generated file, so this needs no regen. A
        # bump that doesn't build is caught by the PR's normal CI, so it can't merge.
        if: steps.drift.outputs.cni == 'true'
        env:
          CNI_SHA: ${{ steps.drift.outputs.cni_sha }}
        run: |
          echo "Bumping CNI_VERSION to $CNI_SHA"
          sed -i "s/^CNI_VERSION=.*/CNI_VERSION=$CNI_SHA/" metadata.mk

      - name: Regenerate
        if: steps.drift.outputs.recent == 'true' || steps.drift.outputs.operator == 'true'
        run: make generate

      - uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0  # v8.1.0
        if: steps.drift.outputs.recent == 'true' || steps.drift.outputs.operator == 'true' || steps.drift.outputs.cni == 'true'
        id: cpr
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Sync upstream: operator CRDs, generated files, CNI pin"
          branch: auto-sync-upstream-${{ matrix.branch }}
          base: ${{ matrix.branch }}
          title: "Auto: sync upstream into [${{ matrix.branch }}]"
          body: |
            Automated sync into `${{ matrix.branch }}`:

            - Operator CRDs from `tigera/operator`
            - Regenerated files (`make generate`)
            - CNI plugin pin (`CNI_VERSION`) bumped to the latest upstream commit

            Only the bits that actually drifted show up in the diff. Triggered by
            scheduled workflow.
          labels: auto-sync,docs-not-required,release-note-not-required,skip-bot-cherry-pick,merge-when-ready
          delete-branch: true

      # The PR author is github-actions[bot] (the GITHUB_TOKEN identity above), so
      # it can't approve its own PR, and the Actions token can't approve PRs anyway.
      # Approve as marvin-tigera (TIGERA_BOT_PAT) so Marvin merges it once CI is green.
      # branch protection has dismiss_stale_reviews off, so a single approval persists
      # across content updates -- the reviewDecision guard keeps reruns quiet.
      - name: Auto-approve so Marvin merges once CI passes
        if: steps.cpr.outputs.pull-request-operation == 'created' || steps.cpr.outputs.pull-request-operation == 'updated'
        env:
          GH_TOKEN: ${{ secrets.TIGERA_BOT_PAT }}
          PR: ${{ steps.cpr.outputs.pull-request-number }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$(gh pr view "$PR" -R "$REPO" --json reviewDecision -q .reviewDecision)" = "APPROVED" ]; then
            echo "PR #$PR already approved; nothing to do."
            exit 0
          fi
          gh pr review "$PR" -R "$REPO" --approve
