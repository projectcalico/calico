name: Trigger Merge Cat

on:
  push:
    branches: [master]

permissions: {}

jobs:
  trigger-merge-queue-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Find merged PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.TIGERA_BOT_PAT }}
        run: |
          if ! PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq 'map(select(.merged_at != null and .base.ref == "master")) | .[0].number // empty'); then
            echo "::warning::Failed to query GitHub API for commit ${{ github.sha }} -- skipping merge-queue dispatch due to API error"
            exit 0
          fi
          if [[ -n "$PR_NUMBER" && "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No associated PR found for ${{ github.sha }} -- skipping merge-queue dispatch"
          fi

      - name: Print information about the push
        run: |
          echo "PR number:        ${{ steps.pr.outputs.number }}"
          echo "Merge commit SHA: ${{ github.sha }}"
          echo "Branch:           ${{ github.ref_name }}"

      - name: Trigger Merge Cat
        if: steps.pr.outputs.number != ''
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.TIGERA_BOT_PAT }}" \
            https://api.github.com/repos/tigera/merge-queue-bot/actions/workflows/221254945/dispatches \
            -d @- <<'EOF'
          {
            "ref": "master",
            "inputs": {
              "trigger_pr_number": "${{ steps.pr.outputs.number }}",
              "trigger_merge_sha": "${{ github.sha }}",
              "triggered_by_action": "OSS_MERGE"
            }
          }
          EOF
