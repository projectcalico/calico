apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: datastoremigrations.migration.projectcalico.org
spec:
  group: migration.projectcalico.org
  names:
    kind: DatastoreMigration
    listKind: DatastoreMigrationList
    plural: datastoremigrations
    singular: datastoremigration
  preserveUnknownFields: false
  scope: Cluster
  versions:
    - additionalPrinterColumns:
        - jsonPath: .status.phase
          name: Phase
          type: string
        - jsonPath: .status.progress.completedTypes
          name: Types Done
          type: integer
        - jsonPath: .status.progress.totalTypes
          name: Types Total
          type: integer
        - jsonPath: .status.progress.currentType
          name: Current Type
          type: string
          priority: 1
        - jsonPath: .status.progress.migrated
          name: Migrated
          type: integer
        - jsonPath: .status.progress.skipped
          name: Skipped
          type: integer
          priority: 1
        - jsonPath: .status.progress.conflicts
          name: Conflicts
          type: integer
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1
      schema:
        openAPIV3Schema:
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              properties:
                type:
                  enum:
                    - V1ToV3
                  type: string
              required:
                - type
              type: object
            status:
              properties:
                completedAt:
                  format: date-time
                  type: string
                conditions:
                  items:
                    properties:
                      lastTransitionTime:
                        format: date-time
                        type: string
                      message:
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                phase:
                  type: string
                progress:
                  properties:
                    totalTypes:
                      type: integer
                    completedTypes:
                      type: integer
                    currentType:
                      type: string
                    total:
                      type: integer
                    migrated:
                      type: integer
                    skipped:
                      type: integer
                    conflicts:
                      type: integer
                    typeDetails:
                      items:
                        properties:
                          kind:
                            type: string
                          migrated:
                            type: integer
                          skipped:
                            type: integer
                          conflicts:
                            type: integer
                        required:
                          - kind
                        type: object
                      type: array
                  type: object
                startedAt:
                  format: date-time
                  type: string
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
